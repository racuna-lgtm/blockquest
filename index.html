<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--grass:#5D8C2E;--gd:#4A7024;--dirt:#8B6914;--dd:#6B4F0E;--sky:#7EC8E3;--sd:#5BA3C9;--gold:#F1C40F;--roblox:#9B59B6;--water:#3498DB;--td:#2C3E50;--tl:#ECF0F1;--bg:#1a1a2e;--red:#E74C3C;--green:#2ecc71;--pb:3px solid #2C3E50}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--td);min-height:100vh;overflow-x:hidden;user-select:none}
.scr{display:none;min-height:100vh;position:relative}.scr.on{display:flex;flex-direction:column}
.pf{font-family:'Press Start 2P',monospace}

/* Splash */
#splash{background:linear-gradient(180deg,var(--sky) 0%,var(--sd) 40%,var(--grass) 40%,var(--gd) 60%,var(--dirt) 60%,var(--dd) 100%);align-items:center;justify-content:center;padding:20px;text-align:center}
#splash h1{font-family:'Press Start 2P',monospace;font-size:clamp(28px,8vw,48px);color:#fff;text-shadow:4px 4px 0 var(--gd);margin-bottom:8px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#splash .sub{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,12px);color:var(--gold);margin-bottom:30px;text-shadow:2px 2px 0 rgba(0,0,0,0.4)}
.sbox{background:rgba(255,255,255,0.95);border-radius:12px;padding:24px;width:100%;max-width:380px;border:var(--pb)}
.sbox label{display:block;font-weight:700;font-size:14px;margin-bottom:8px}
.sbox input[type="text"]{width:100%;padding:12px;border:var(--pb);border-radius:8px;font-family:'Nunito',sans-serif;font-size:16px;margin-bottom:16px;outline:none}
.avg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.avo{aspect-ratio:1;border:3px solid #ccc;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:36px;transition:all .2s;background:#f9f9f9}
.avo span{font-size:10px;margin-top:4px;font-weight:700}.avo.sel{border-color:var(--grass);background:#e8f5e9;transform:scale(1.08)}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,14px);padding:14px 28px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;border:var(--pb)}
.btn:active{transform:scale(0.95)}
.b1{background:var(--grass);color:#fff}.b2{background:var(--gold);color:var(--td)}.b3{background:#ecf0f1;color:var(--td)}.b4{background:var(--roblox);color:#fff}

/* Tutorial */
.tov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}.tov.hid{display:none}
.tcard{background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;text-align:center;border:var(--pb)}
.tcard .te{font-size:56px;margin-bottom:12px}.tcard h3{font-family:'Press Start 2P',monospace;font-size:13px;margin-bottom:12px;line-height:1.6}.tcard p{font-size:15px;color:#555;margin-bottom:20px;line-height:1.6}
.tdots{display:flex;gap:8px;justify-content:center;margin-bottom:16px}.tdot{width:10px;height:10px;border-radius:50%;background:#ddd}.tdot.on{background:var(--grass)}

/* Island */
#island{background:linear-gradient(180deg,var(--sky) 0%,var(--sd) 35%,transparent 35%);background-color:var(--grass);padding-bottom:20px}
.ih{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.pi{display:flex;align-items:center;gap:10px}.pa{font-size:32px}
.pn{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,14px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,0.3)}
.sb{font-family:'Press Start 2P',monospace;font-size:11px;background:rgba(0,0,0,0.3);color:var(--gold);padding:6px 12px;border-radius:20px}
.il{text-align:center;font-size:12px;color:rgba(255,255,255,0.6);padding:4px 0}
.igw{padding:4px 12px;display:flex;justify-content:center}
.ig{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;width:100%;max-width:340px;background:var(--dd);border:4px solid var(--dd);border-radius:8px;padding:2px}
.ic{background:var(--grass);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4.5vw,24px);aspect-ratio:1;transition:all .15s}
.ic.hi{background:#4a8c1e}.ic.pl{background:var(--gd);cursor:pointer;animation:pu 1s ease-in-out infinite}
@keyframes pu{0%,100%{box-shadow:inset 0 0 0 rgba(241,196,15,0)}50%{box-shadow:inset 0 0 8px rgba(241,196,15,0.5)}}
.ca{padding:16px;display:flex;justify-content:center}
.dc{background:rgba(255,255,255,0.95);border:4px solid var(--gold);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;max-width:380px;width:100%;box-shadow:0 0 20px rgba(241,196,15,0.3)}
.dc:active{transform:scale(0.97)}.dc.av{animation:gl 1.5s ease-in-out infinite}.dc.dn{opacity:0.6;cursor:default;animation:none;border-color:#ccc;box-shadow:none}
@keyframes gl{0%,100%{box-shadow:0 0 15px rgba(241,196,15,0.3)}50%{box-shadow:0 0 35px rgba(241,196,15,0.6)}}
.ci{font-size:44px}.ct h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:6px}.ct p{font-size:14px;color:#666}
.car{margin-left:auto;font-size:28px;animation:ab 1s ease-in-out infinite}
@keyframes ab{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
.inav{padding:12px 16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.inav .btn{font-size:9px;padding:10px 16px;flex:1;max-width:180px}
.pbr{background:var(--gold);color:var(--td);text-align:center;padding:10px;font-family:'Press Start 2P',monospace;font-size:9px;line-height:1.5;display:none}.pbr.on{display:block}

/* BATTLE SCREEN */
#battle{background:var(--bg);color:var(--tl);padding:16px;align-items:center}
.battle-arena{max-width:440px;width:100%;margin-top:8px}
.battle-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
.battle-side{text-align:center}
.battle-side .bs-label{font-family:'Press Start 2P',monospace;font-size:8px;color:#999;margin-bottom:4px}
.battle-side .bs-sprite{font-size:48px;transition:all .3s}
.battle-side .bs-hp{font-size:20px;letter-spacing:2px;margin-top:4px;min-height:24px}
.bs-sprite.hit{animation:hitShake .4s}
.bs-sprite.dead{opacity:0.3;filter:grayscale(1)}
@keyframes hitShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.battle-vs{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-top:8px}
.battle-round{font-family:'Press Start 2P',monospace;font-size:9px;color:#666;text-align:center;margin-bottom:12px}
.battle-q{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:12px;padding:16px;margin-bottom:12px}
.battle-q .bq-text{font-size:15px;line-height:1.7;color:#ccc;margin-bottom:14px}
.battle-q .bq-ask{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);line-height:1.5;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;padding:14px 18px;font-size:15px;color:#fff;cursor:pointer;transition:all .2s;text-align:left;font-family:'Nunito',sans-serif;font-weight:600}
.opt:hover{background:rgba(255,255,255,0.18)}
.opt.ok{background:rgba(46,204,113,0.3)!important;border-color:var(--green)!important}
.opt.no{background:rgba(231,76,60,0.3)!important;border-color:var(--red)!important;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.fb{padding:12px;border-radius:10px;margin-top:10px;font-size:13px;line-height:1.5}
.fb-ok{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);color:var(--green)}
.fb-no{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:var(--red)}
.btn-flee{background:transparent;border:2px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-size:11px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:8px}
.battle-result{text-align:center;padding:20px}
.battle-result .br-emoji{font-size:64px;margin-bottom:12px}
.battle-result h3{font-family:'Press Start 2P',monospace;font-size:14px;margin-bottom:8px;line-height:1.5}
.battle-result p{font-size:14px;color:#999;margin-bottom:20px}

/* Exploration */
#explo{background:var(--bg);color:var(--tl);padding:16px;align-items:center}
.explo-card{max-width:440px;width:100%;margin-top:8px}
.explo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.explo-hp{font-size:20px;letter-spacing:2px}
.explo-step{font-family:'Press Start 2P',monospace;font-size:9px;color:#666}
.explo-badge{font-family:'Press Start 2P',monospace;font-size:9px;padding:4px 10px;border-radius:12px;display:inline-block;margin-bottom:12px}
.be{background:var(--roblox);color:#fff}.br{background:var(--water);color:#fff}
.explo-title{font-family:'Press Start 2P',monospace;font-size:clamp(11px,3vw,14px);margin-bottom:12px;line-height:1.6;color:var(--gold)}
.explo-text{font-size:15px;line-height:1.7;color:#ccc;background:rgba(0,0,0,0.3);padding:16px;border-radius:10px;border-left:4px solid var(--gold);margin-bottom:14px}
.explo-clues{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.explo-clue{background:rgba(241,196,15,0.15);border:1px solid rgba(241,196,15,0.3);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--gold)}

/* Victory / Game Over */
#victory{background:radial-gradient(ellipse at center,#2c1654 0%,var(--bg) 70%);align-items:center;justify-content:center;text-align:center;padding:20px}
.vch{font-size:80px;animation:vb .8s ease-out}
@keyframes vb{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.vt{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5vw,24px);color:var(--gold);margin:16px 0 8px;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.vi{font-size:56px;margin:16px 0;animation:fl 2s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.vn{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--tl);margin-bottom:4px}
.vr{font-size:11px;font-weight:700;margin-bottom:24px;padding:4px 12px;border-radius:12px;display:inline-block}
.vr-r{background:var(--water);color:#fff}.vr-e{background:var(--roblox);color:#fff}
.vs{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:20px}
.vbs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}.vbs .btn{width:100%}

/* Inventory, Portal, Admin - compact */
#inventory{background:linear-gradient(180deg,var(--dirt) 0%,var(--dd) 100%);padding:16px}
.invh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.invh h2{font-family:'Press Start 2P',monospace;font-size:14px;color:#fff}
.inv-empty{text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:40px 20px;line-height:1.6}
.invg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.invs{aspect-ratio:1;background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.invs .invn{font-size:7px;font-family:'Press Start 2P',monospace;color:rgba(255,255,255,0.7);margin-top:4px;text-align:center;line-height:1.3}
#portal{background:var(--bg);padding:16px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ph h2{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold)}
.wg{display:flex;flex-direction:column;gap:12px}
.wc{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.wc:active{transform:scale(0.98)}.wi{font-size:36px}
.winfo h3{font-family:'Press Start 2P',monospace;font-size:10px;color:#fff;margin-bottom:4px}.winfo p{font-size:12px;color:#999}
.wp{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold)}
#admin{background:#1a1a2e;padding:16px;color:#fff}
.ah{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ah h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--roblox)}
.as{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-bottom:16px}
.as h3{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:12px}
.sr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:14px}.sv{font-weight:700;color:var(--gold)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:20px}.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:340px;width:100%;border:var(--pb)}
.mbox h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:8px}.mbox p{font-size:14px;color:#666;margin-bottom:16px}
.ci2{display:flex;gap:8px;justify-content:center;margin:16px 0}
.ci2 input{width:48px;height:48px;text-align:center;font-size:20px;font-weight:700;border:var(--pb);border-radius:8px;outline:none;font-family:'Nunito',sans-serif}
.mbtn{display:flex;gap:8px;justify-content:center}.mbtn .btn{font-size:9px;padding:10px 14px}
</style>
</head>
<body>

<div class="tov hid" id="tut"><div class="tcard"><div class="te" id="tutE">🎁</div><h3 id="tutT"></h3><p id="tutP"></p><div class="tdots" id="tutD"></div><button class="btn b1" onclick="nxTut()" id="tutB" style="width:100%"></button></div></div>

<div id="splash" class="scr on">
  <h1>BlockQuest</h1><p class="sub">Tu isla, tus misiones</p>
  <div class="sbox">
    <label>¿Cómo te llamas?</label><input type="text" id="pName" placeholder="Tu nombre" maxlength="16" autocomplete="off">
    <label>Elige tu avatar</label><div class="avg" id="avG"></div>
    <button class="btn b1" onclick="startGame()" style="width:100%">⚔️ ¡COMENZAR!</button>
  </div>
</div>

<div id="island" class="scr">
  <div class="pbr" id="pBnr">📍 Toca una celda para colocar tu item — <span style="font-family:Nunito;cursor:pointer;text-decoration:underline" onclick="cancelPl()">Cancelar</span></div>
  <div class="ih"><div class="pi"><span class="pa" id="iAv"></span><span class="pn" id="iNm"></span></div><div class="sb" id="sBdg">🔥 0</div></div>
  <div class="il" id="iLbl">🏝️ Tu isla</div>
  <div class="igw"><div class="ig" id="iGr"></div></div>
  <div class="ca"><div class="dc" id="dCh" onclick="openDaily()"><span class="ci" id="cIc">🎁</span><div class="ct"><h3 id="cTi">👆 TOCA AQUÍ 👆</h3><p id="cSu">Abre tu misión del día</p></div><span class="car" id="cAr">▶</span></div></div>
  <div class="inav"><button class="btn b2" onclick="showS('portal')">🌍 Más Misiones</button><button class="btn b3" onclick="showS('inventory')">🎒 Inventario</button></div>
  <div style="text-align:center;padding:8px"><span style="font-size:10px;color:rgba(255,255,255,0.3);cursor:pointer" id="adTr">BlockQuest v2</span></div>
</div>

<div id="battle" class="scr">
  <button class="btn-flee" onclick="flee()">← Huir</button>
  <div class="battle-arena" id="bArena"></div>
</div>

<div id="explo" class="scr">
  <button class="btn-flee" onclick="flee()">← Huir</button>
  <div class="explo-card" id="eCard"></div>
</div>

<div id="victory" class="scr">
  <div class="vch">🎁</div><h2 class="vt">¡Misión Cumplida!</h2>
  <div class="vi" id="vEm"></div><div class="vn" id="vNm"></div><div class="vr" id="vRr"></div><div class="vs" id="vSt"></div>
  <div class="vbs"><button class="btn b2" onclick="plVic()">🏝️ Poner en mi isla</button><button class="btn b3" onclick="showS('island')">🎒 Guardar</button></div>
</div>

<div id="inventory" class="scr">
  <div class="invh"><h2>🎒 Inventario</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div id="invC"></div>
</div>

<div id="portal" class="scr">
  <div class="ph"><h2>🌍 Portal de Aventuras</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div class="wg" id="wGr"></div>
</div>

<div id="admin" class="scr">
  <div class="ah"><h2>🔮 Panel Mamá</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div id="adC"></div>
</div>

<div class="modal" id="codeM"><div class="mbox"><h3>🔒 Código Secreto</h3><p>4 dígitos</p><div class="ci2"><input type="number" maxlength="1" class="cd" data-i="0"><input type="number" maxlength="1" class="cd" data-i="1"><input type="number" maxlength="1" class="cd" data-i="2"><input type="number" maxlength="1" class="cd" data-i="3"></div><div class="mbtn"><button class="btn b4" onclick="chkCode()">Entrar</button><button class="btn b3" onclick="clCode()">Cancelar</button></div></div></div>

<script>
const CODE='2017',AVS=[{id:'creeper',e:'👾',n:'Creeper'},{id:'warrior',e:'⚔️',n:'Guerrera'},{id:'cat',e:'🐱',n:'Gatita'},{id:'star',e:'⭐',n:'Estrella'},{id:'flower',e:'🌸',n:'Flor'},{id:'dragon',e:'🐉',n:'Dragón'}];
const WS=[{id:'lab',n:'Lab. de Pociones',i:'⚗️',d:'Lógica y números'},{id:'cas',n:'Castillo Antiguo',i:'🏰',d:'Civilizaciones'},{id:'vol',n:'Volcán de Fuego',i:'🌋',d:'Ciencia'},{id:'bib',n:'Biblioteca Encantada',i:'📜',d:'Lenguaje'},{id:'tie',n:'Tierra Desconocida',i:'🗺️',d:'English'}];
const MOBS={alq:'🧙',crp:'💚',cap:'🏴‍☠️',vir:'🦠',lib:'📖',fan:'👻',tri:'🎭',gol:'🗿',esq:'💀'};
const TUT=[{e:'🎁',t:'¡Cada día un cofre!',p:'Toca el cofre dorado para empezar tu misión del día.'},{e:'⚔️',t:'Batallas de verdad',p:'Tú y el enemigo tienen 3 ❤️ cada uno. ¡Cada error te quita una vida!'},{e:'🏝️',t:'Construye tu isla',p:'Gana items y ponlos en tu isla. ¡Mírala crecer!'},{e:'🌍',t:'5 mundos',p:'Toca "Más Misiones" para explorar todos los mundos.'}];
let tS=0;function showTut(){tS=0;$('tut').classList.remove('hid');rTut();}
function rTut(){const s=TUT[tS];$('tutE').textContent=s.e;$('tutT').textContent=s.t;$('tutP').textContent=s.p;$('tutB').textContent=tS<TUT.length-1?'Siguiente →':'¡A jugar! 🎮';$('tutD').innerHTML=TUT.map((_,i)=>`<div class="tdot ${i===tS?'on':''}"></div>`).join('');}
function nxTut(){tS++;if(tS>=TUT.length){$('tut').classList.add('hid');S.tut=1;save();}else rTut();}

function $(id){return document.getElementById(id);}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function hpStr(cur,max){return '❤️'.repeat(cur)+'🖤'.repeat(max-cur);}

// ===== QUESTION GENERATORS =====
function qPatterns(){
  const ops=[
    ()=>{const m=[2,3,4,5][ri(0,3)],s=ri(2,6),seq=[s];for(let i=0;i<3;i++)seq.push(seq[i]*m);const a=seq[3]*m;return{q:`Secuencia: ${seq.join(', ')}... ¿Siguiente?`,opts:[{tx:''+a,ok:1},{tx:''+(seq[3]+m),ok:0},{tx:''+(seq[3]*2),ok:0}],fb_ok:`Cada número se multiplica por ${m}.`,fb_no:`Fíjate: ${seq[0]}×${m}=${seq[1]}, ${seq[1]}×${m}=${seq[2]}...`};},
    ()=>{const d=ri(3,8),s=ri(2,9),seq=[s];for(let i=0;i<3;i++)seq.push(seq[i]+d);const a=seq[3]+d;return{q:`Secuencia: ${seq.join(', ')}... ¿Siguiente?`,opts:[{tx:''+a,ok:1},{tx:''+(seq[3]+d+1),ok:0},{tx:''+(seq[3]+d-2),ok:0}],fb_ok:`Se suma ${d} cada vez.`,fb_no:`Fíjate: ${seq[1]}-${seq[0]}=${d}. Se suma ${d} cada vez.`};},
    ()=>{const s=ri(1,5),seq=[s*s,(s+1)*(s+1),(s+2)*(s+2),(s+3)*(s+3)];const a=(s+4)*(s+4);return{q:`Secuencia: ${seq.join(', ')}... ¿Siguiente?`,opts:[{tx:''+a,ok:1},{tx:''+(seq[3]+seq[3]-seq[2]),ok:0},{tx:''+(seq[3]+2),ok:0}],fb_ok:`Son cuadrados perfectos: ${s}², ${s+1}², ${s+2}²...`,fb_no:`Busca el patrón: ${s}²=${seq[0]}, ${s+1}²=${seq[1]}...`};}
  ];
  return ops[ri(0,ops.length-1)]();
}
function qDivision(){
  const tot=ri(10,50)*6,cofres=ri(6,9),dest=ri(1,3),q2=cofres-dest,r=tot/q2,tr=tot/cofres;
  return{q:`Tienes ${tot} bloques para ${cofres} cofres. Un creeper destruye ${dest}. Repartes los ${tot} en los ${q2} que quedan. ¿Cuántos por cofre?`,
    opts:[{tx:''+r,ok:1},{tx:''+tr,ok:0},{tx:''+(tr+dest),ok:0}],
    fb_ok:`${tot} ÷ ${q2} = ${r}. Hay que recalcular con los cofres que quedan.`,
    fb_no:`Quedan ${q2} cofres, no ${cofres}. Divide ${tot} ÷ ${q2}.`};
}
function qFractions(){
  const d=[4,5,6,8,10][ri(0,4)],n1=ri(1,d-2),n2=ri(1,d-n1-1),sum=n1+n2,falta=d-sum;
  return{q:`Mezclaste ${n1}/${d} de agua lunar y ${n2}/${d} de polvo estelar. ¿Cuánto falta para llegar a ${d}/${d} (un litro completo)?`,
    opts:[{tx:`${falta}/${d}`,ok:1},{tx:`${sum}/${d}`,ok:0},{tx:`${n1}/${d}`,ok:0}],
    fb_ok:`${n1}/${d} + ${n2}/${d} = ${sum}/${d}. Falta ${falta}/${d} para ${d}/${d}.`,
    fb_no:`Suma: ${n1}/${d} + ${n2}/${d} = ${sum}/${d}. Para llegar a ${d}/${d}, falta ${d}-${sum} = ${falta}.`};
}
function qDecimals(){
  const a=ri(10,40)/10,b=ri(10,30)/10,lim=ri(4,6),sum=Math.round((a+b)*10)/10;
  const sobra=Math.round((lim-sum)*10)/10;
  const q=sobra>=0?`Inventario: ${a} kg + item de ${b} kg. Límite: ${lim} kg. ¿Cuánto espacio te queda?`:`Tu inventario pesa ${a} kg. Encontraste algo de ${b} kg. Límite: ${lim} kg. ¿Cuánto espacio queda?`;
  return{q:q,opts:[{tx:`${Math.abs(sobra)} kg ${sobra>=0?'libres':'de más'}`,ok:1},{tx:`${sum} kg`,ok:0},{tx:`${lim} kg`,ok:0}],
    fb_ok:`${a} + ${b} = ${sum}. ${lim} - ${sum} = ${sobra}.`,fb_no:`Suma: ${a} + ${b} = ${sum}. Compara con el límite de ${lim} kg.`};
}

// ===== GAME STATE =====
let S={},MS=[],curM=null,bState=null,plIt=null;
function defS(){return{perfil:null,isla:Array(6).fill(null).map(()=>Array(6).fill(null)),inv:[],done:[],racha:{a:0,m:0,u:null},diaria:{f:null,id:null,c:false},tut:0};}
function load(){try{const s=localStorage.getItem('bq2');S=s?JSON.parse(s):defS();}catch(e){S=defS();}}
function save(){localStorage.setItem('bq2',JSON.stringify(S));}

function init(){
  load();MS=genMissions();
  if(S.perfil){renderIsland();showS('island');if(!S.tut)showTut();}
  else{renderAv();showS('splash');}
  setupAdmin();setupCodeIn();
}

function renderAv(){$('avG').innerHTML=AVS.map(a=>`<div class="avo" data-id="${a.id}" onclick="selAv('${a.id}')">${a.e}<span>${a.n}</span></div>`).join('');}
let sAv=null;
function selAv(id){sAv=id;document.querySelectorAll('.avo').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));}
function startGame(){
  const n=$('pName').value.trim();if(!n||!sAv)return;
  S.perfil={nombre:n,avatar:sAv,fi:todayS()};
  S.isla[2][3]={id:'tree0',n:'Árbol Inicial',e:'🌲'};
  save();renderIsland();showS('island');showTut();
}
function showS(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
  if(id==='island')renderIsland();if(id==='inventory')renderInv();if(id==='portal')renderPortal();if(id==='admin')renderAdmin();
  window.scrollTo(0,0);
}

// ===== ISLAND =====
function renderIsland(){
  if(!S.perfil)return;
  const av=AVS.find(a=>a.id===S.perfil.avatar);
  $('iAv').textContent=av?av.e:'👾';$('iNm').textContent=S.perfil.nombre;
  $('sBdg').textContent=`🔥 ${S.racha.a}`;
  const g=$('iGr');g.innerHTML='';
  for(let r=0;r<6;r++)for(let c=0;c<6;c++){
    const cell=document.createElement('div');cell.className='ic';
    const it=S.isla[r][c];
    if(it){cell.textContent=it.e;cell.classList.add('hi');}
    if(plIt&&!it){cell.classList.add('pl');cell.onclick=()=>placeOn(r,c);}
    g.appendChild(cell);
  }
  $('pBnr').classList.toggle('on',!!plIt);
  $('iLbl').textContent=plIt?'':'🏝️ Completa misiones para llenar tu isla';
  updateChest();
}

function updateChest(){
  const today=todayS(),ch=$('dCh'),ic=$('cIc'),ti=$('cTi'),su=$('cSu'),ar=$('cAr');
  if(!S.diaria.f||S.diaria.f!==today){
    const avail=MS.filter(m=>!S.done.find(d=>d.id===m.id));
    if(!avail.length){ic.textContent='✅';ti.textContent='¡Todo conquistado!';su.textContent='Pide nuevas misiones a mamá 😄';ch.classList.remove('av');ch.classList.add('dn');ar.textContent='';return;}
    S.diaria={f:today,id:avail[ri(0,avail.length-1)].id,c:false};save();
  }
  if(S.diaria.c){ic.textContent='✅';ti.textContent='¡Misión cumplida!';su.textContent='Vuelve mañana o toca "Más Misiones"';ch.classList.remove('av');ch.classList.add('dn');ar.textContent='';}
  else{ic.textContent='🎁';ti.textContent='👆 TOCA AQUÍ 👆';su.textContent='Tu misión del día te espera';ch.classList.add('av');ch.classList.remove('dn');ar.textContent='▶';}
}
function openDaily(){if(S.diaria.c)return;const m=MS.find(x=>x.id===S.diaria.id);if(m)startBattle(m);}

// ===== BATTLE SYSTEM =====
function startBattle(m){
  curM=m;
  const pool=m.pool();
  bState={pHp:3,mHp:3,pool:shuf(pool),round:0,used:[]};
  showS('battle');
  renderBattle();
}

function renderBattle(){
  const a=$('bArena'),s=bState,m=curM;
  const mob=MOBS[m.mob]||'👾';
  const av=AVS.find(x=>x.id===S.perfil.avatar);

  // Check win/lose
  if(s.mHp<=0){a.innerHTML=`<div class="battle-result"><div class="br-emoji">🎉</div><h3 style="color:var(--green)">¡VICTORIA!</h3><p>Derrotaste a ${m.mobN}</p><button class="btn b2" style="width:100%" onclick="win()">🎁 ¡Abrir cofre!</button></div>`;return;}
  if(s.pHp<=0){a.innerHTML=`<div class="battle-result"><div class="br-emoji">💀</div><h3 style="color:var(--red)">¡Caíste!</h3><p>${m.mobN} te derrotó. ¡Inténtalo de nuevo!</p><button class="btn b1" style="width:100%;margin-bottom:10px" onclick="startBattle(curM)">🔄 Reintentar</button><button class="btn b3" style="width:100%" onclick="flee()">← Huir</button></div>`;return;}

  // Get next question
  if(s.round>=s.pool.length){s.pool=shuf(m.pool());s.round=0;} // regenerate if exhausted
  const q=s.pool[s.round];
  const opts=shuf(q.opts.map((o,i)=>({...o,oi:i})));

  a.innerHTML=`
    <div class="battle-top">
      <div class="battle-side"><div class="bs-label">TÚ</div><div class="bs-sprite" id="bPlayer">${av?av.e:'👾'}</div><div class="bs-hp" id="bpHp">${hpStr(s.pHp,3)}</div></div>
      <div class="battle-vs">VS</div>
      <div class="battle-side"><div class="bs-label">${m.mobN}</div><div class="bs-sprite" id="bMob">${mob}</div><div class="bs-hp" id="bmHp">${hpStr(s.mHp,3)}</div></div>
    </div>
    <div class="battle-round">Ronda ${s.used.length+1}</div>
    <div class="battle-q">
      <div class="bq-ask">${q.q}</div>
      <div class="opts">${opts.map(o=>`<div class="opt" data-ok="${o.ok}" onclick="pickB(this,${o.ok})">${o.tx}</div>`).join('')}</div>
      <div id="bFb"></div>
    </div>`;
}

function pickB(el,ok){
  document.querySelectorAll('.opt').forEach(e=>e.style.pointerEvents='none');
  const q=bState.pool[bState.round];
  el.classList.add(ok?'ok':'no');

  if(ok){
    bState.mHp--;
    $('bmHp').textContent=hpStr(bState.mHp,3);
    $('bMob').classList.add('hit');
    $('bFb').innerHTML=`<div class="fb fb-ok">✅ ${q.fb_ok}</div>`;
  } else {
    bState.pHp--;
    $('bpHp').textContent=hpStr(bState.pHp,3);
    $('bPlayer').classList.add('hit');
    $('bFb').innerHTML=`<div class="fb fb-no">💥 ${q.fb_no}</div>`;
  }

  bState.used.push(bState.round);
  bState.round++;

  setTimeout(()=>{
    $('bMob').classList.remove('hit');
    $('bPlayer').classList.remove('hit');
    renderBattle();
  },1800);
}

function flee(){curM=null;bState=null;showS('island');}

// ===== VICTORY =====
function win(){
  const m=curM;
  S.done.push({id:m.id,f:todayS(),w:m.w});
  if(S.diaria.id===m.id){S.diaria.c=true;updStr();}
  S.inv.push({id:m.item.id,n:m.item.n,r:m.item.r,e:m.item.e});
  save();
  $('vEm').textContent=m.item.e;$('vNm').textContent=m.item.n;
  const re=$('vRr');re.textContent=m.item.r.toUpperCase();re.className='vr vr-'+m.item.r[0];
  $('vSt').textContent=S.racha.a>1?`🔥 Racha: ${S.racha.a} días`:'';
  showS('victory');MS=genMissions();
}
function updStr(){const t=todayS(),y=yesterdayS();if(S.racha.u===y)S.racha.a++;else if(S.racha.u!==t)S.racha.a=1;S.racha.u=t;if(S.racha.a>S.racha.m)S.racha.m=S.racha.a;}

// ===== PLACING =====
function plVic(){plIt=S.inv[S.inv.length-1];showS('island');}
function placeOn(r,c){if(!plIt||S.isla[r][c])return;S.isla[r][c]={id:plIt.id,n:plIt.n,e:plIt.e};const i=S.inv.findIndex(x=>x.id===plIt.id);if(i>-1)S.inv.splice(i,1);plIt=null;save();renderIsland();}
function cancelPl(){plIt=null;renderIsland();}
function plFromInv(i){plIt=S.inv[i];showS('island');}

// ===== INVENTORY =====
function renderInv(){
  const c=$('invC');
  if(!S.inv.length){c.innerHTML='<div class="inv-empty">🎒 Vacío. ¡Completa misiones para ganar items!</div>';return;}
  c.innerHTML=`<div class="invg">${S.inv.map((it,i)=>`<div class="invs" onclick="plFromInv(${i})">${it.e}<span class="invn">${it.n}</span></div>`).join('')}</div>`;
}

// ===== PORTAL =====
function renderPortal(){
  $('wGr').innerHTML=WS.map(w=>{
    const tot=MS.filter(m=>m.w===w.id).length,dn=S.done.filter(d=>d.w===w.id).length;
    return`<div class="wc" onclick="openW('${w.id}')"><span class="wi">${w.i}</span><div class="winfo"><h3>${w.n}</h3><p>${w.d}</p></div><span class="wp">${dn}/${tot}</span></div>`;
  }).join('');
}
function openW(wid){
  const ms=MS.filter(m=>m.w===wid),w=WS.find(x=>x.id===wid);
  $('wGr').innerHTML=`
    <button class="btn b3" onclick="renderPortal()" style="font-size:9px;padding:8px 12px;align-self:flex-start">← Mundos</button>
    <h3 style="font-family:'Press Start 2P';font-size:12px;color:#fff;margin:8px 0">${w.i} ${w.n}</h3>
    ${ms.map(m=>{
      const dn=S.done.find(d=>d.id===m.id);
      return`<div class="wc" onclick="${dn?'':'startBattle(MS.find(x=>x.id===\\''+m.id+'\\'))'}" style="${dn?'opacity:0.5':''}"><span class="wi">${m.item.e}</span><div class="winfo"><h3 style="font-size:10px">${m.titulo}</h3><p>${m.r.toUpperCase()} · ⚔️ Batalla</p></div><span class="wp">${dn?'✅':'▶️'}</span></div>`;
    }).join('')}`;
}

// ===== ADMIN =====
function setupAdmin(){let t=0,ti;$('adTr').addEventListener('click',()=>{t++;clearTimeout(ti);if(t>=4){t=0;$('codeM').classList.add('on');document.querySelector('.cd').focus();}ti=setTimeout(()=>t=0,2000);});}
function setupCodeIn(){document.querySelectorAll('.cd').forEach((inp,i)=>{inp.addEventListener('input',e=>{if(e.target.value.length>1)e.target.value=e.target.value.slice(-1);if(e.target.value&&i<3)document.querySelectorAll('.cd')[i+1].focus();});inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)document.querySelectorAll('.cd')[i-1].focus();});});}
function chkCode(){const c=Array.from(document.querySelectorAll('.cd')).map(d=>d.value).join('');if(c===CODE){clCode();showS('admin');}else{document.querySelectorAll('.cd').forEach(d=>{d.value='';d.style.borderColor='var(--red)';});setTimeout(()=>document.querySelectorAll('.cd').forEach(d=>d.style.borderColor=''),1000);document.querySelector('.cd').focus();}}
function clCode(){$('codeM').classList.remove('on');document.querySelectorAll('.cd').forEach(d=>d.value='');}

function renderAdmin(){
  const c=$('adC'),bw=WS.map(w=>({...w,c:S.done.filter(x=>x.w===w.id).length}));
  c.innerHTML=`
    <div class="as"><h3>📊 Estadísticas</h3>
      <div class="sr"><span>Misiones completadas</span><span class="sv">${S.done.length} / ${MS.length}</span></div>
      <div class="sr"><span>Racha actual</span><span class="sv">🔥 ${S.racha.a}</span></div>
      <div class="sr"><span>Mejor racha</span><span class="sv">🏆 ${S.racha.m}</span></div>
      <div class="sr"><span>Items en isla</span><span class="sv">${S.isla.flat().filter(Boolean).length}</span></div></div>
    <div class="as"><h3>🌍 Por Mundo</h3>${bw.map(w=>`<div class="sr"><span>${w.i} ${w.n}</span><span class="sv">${w.c}</span></div>`).join('')}</div>
    <div class="as"><h3>💾 Respaldo</h3><p style="font-size:13px;color:#999;margin-bottom:12px">Copia para no perder progreso.</p>
      <button class="btn b2" onclick="expB()" style="width:100%;margin-bottom:8px;font-size:9px">📋 Copiar</button>
      <button class="btn b3" onclick="impB()" style="width:100%;font-size:9px">📥 Restaurar</button></div>
    <div class="as"><h3>⚠️ Peligro</h3><button class="btn" style="width:100%;font-size:9px;background:var(--red);color:#fff;border-color:#c0392b" onclick="resetG()">🗑️ Reiniciar</button></div>`;
}
function expB(){navigator.clipboard.writeText(JSON.stringify(S)).then(()=>alert('✅ Copiado')).catch(()=>prompt('Copia:',JSON.stringify(S)));}
function impB(){const d=prompt('Pega:');if(d){try{S=JSON.parse(d);save();location.reload();}catch(e){alert('❌ No válido');}}}
function resetG(){if(confirm('⚠️ ¿Borrar TODO?'))if(confirm('🔴 ÚLTIMA VEZ')){localStorage.removeItem('bq2');location.reload();}}

function todayS(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function yesterdayS(){const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
