<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --grass: #5D8C2E;
  --grass-dark: #4A7024;
  --dirt: #8B6914;
  --dirt-dark: #6B4F0E;
  --sky: #7EC8E3;
  --sky-dark: #5BA3C9;
  --stone: #7F8C8D;
  --gold: #F1C40F;
  --gold-dark: #D4AC0D;
  --roblox: #9B59B6;
  --epic: #E74C3C;
  --wood: #A0522D;
  --water: #3498DB;
  --text-dark: #2C3E50;
  --text-light: #ECF0F1;
  --chest-glow: #F39C12;
  --bg-dark: #1a1a2e;
  --bg-card: rgba(255,255,255,0.95);
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --pixel-border: 3px solid #2C3E50;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Nunito',sans-serif;
  background: var(--bg-dark);
  color: var(--text-dark);
  min-height:100vh;
  overflow-x:hidden;
  user-select:none;
}
.pixel-font { font-family:'Press Start 2P',monospace; }

/* ===== SCREENS ===== */
.screen { display:none; min-height:100vh; position:relative; }
.screen.active { display:flex; flex-direction:column; }

/* ===== SPLASH ===== */
#splash {
  background: linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 40%, var(--grass) 40%, var(--grass-dark) 60%, var(--dirt) 60%, var(--dirt-dark) 100%);
  align-items:center; justify-content:center; padding:20px; text-align:center;
}
#splash h1 {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(28px,8vw,48px);
  color:#fff;
  text-shadow: 4px 4px 0 var(--grass-dark), -1px -1px 0 rgba(0,0,0,0.3);
  margin-bottom:8px;
  animation: titleBounce 2s ease-in-out infinite;
}
@keyframes titleBounce {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-8px); }
}
#splash .subtitle {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.5vw,12px);
  color:var(--gold);
  margin-bottom:30px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}
.splash-box {
  background:var(--bg-card);
  border-radius:12px;
  padding:24px;
  width:100%;
  max-width:380px;
  border:var(--pixel-border);
}
.splash-box label {
  display:block;
  font-weight:700;
  font-size:14px;
  margin-bottom:8px;
  color:var(--text-dark);
}
.splash-box input {
  width:100%;
  padding:12px;
  border:var(--pixel-border);
  border-radius:8px;
  font-family:'Nunito',sans-serif;
  font-size:16px;
  margin-bottom:16px;
  outline:none;
}
.splash-box input:focus { border-color:var(--grass); }
.avatar-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}
.avatar-option {
  aspect-ratio:1;
  border:3px solid #ccc;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:36px;
  transition:all .2s;
  background:#f9f9f9;
}
.avatar-option span { font-size:10px; margin-top:4px; font-weight:700; }
.avatar-option.selected { border-color:var(--grass); background:#e8f5e9; transform:scale(1.08); }
.avatar-option:active { transform:scale(0.95); }

.btn {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,3vw,14px);
  padding:14px 28px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:all .15s;
  border:var(--pixel-border);
}
.btn:active { transform:scale(0.95); }
.btn-primary { background:var(--grass); color:#fff; }
.btn-primary:hover { background:var(--grass-dark); }
.btn-gold { background:var(--gold); color:var(--text-dark); }
.btn-gold:hover { background:var(--gold-dark); }
.btn-secondary { background:#ecf0f1; color:var(--text-dark); }
.btn-roblox { background:var(--roblox); color:#fff; }

/* ===== ISLAND ===== */
#island {
  background: linear-gradient(180deg, var(--sky) 0%, var(--sky-dark) 35%, transparent 35%);
  background-color: var(--grass);
  padding-bottom: 20px;
}
.island-header {
  padding:16px 16px 8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.island-header .player-info {
  display:flex;
  align-items:center;
  gap:10px;
}
.island-header .player-avatar { font-size:32px; }
.island-header .player-name {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,3vw,14px);
  color:#fff;
  text-shadow:2px 2px 0 rgba(0,0,0,0.3);
}
.streak-badge {
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  background:rgba(0,0,0,0.3);
  color:var(--gold);
  padding:6px 12px;
  border-radius:20px;
}
.island-grid-wrapper {
  padding:8px 12px;
  display:flex;
  justify-content:center;
}
.island-grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:3px;
  width:100%;
  max-width:380px;
  aspect-ratio:1;
  background:var(--dirt-dark);
  border:4px solid var(--dirt-dark);
  border-radius:8px;
  padding:3px;
}
.island-cell {
  background:var(--grass);
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,5vw,28px);
  cursor:pointer;
  transition:all .15s;
  position:relative;
  aspect-ratio:1;
}
.island-cell:hover { background:var(--grass-dark); }
.island-cell.has-item { background:#4a8c1e; }
.island-cell.empty-slot::after {
  content:'';
  width:30%;
  height:30%;
  border:2px dashed rgba(255,255,255,0.3);
  border-radius:4px;
}
.chest-area {
  padding:12px 16px;
  display:flex;
  justify-content:center;
}
.daily-chest {
  background:var(--bg-card);
  border:var(--pixel-border);
  border-radius:12px;
  padding:16px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  cursor:pointer;
  transition:all .2s;
  max-width:380px;
  width:100%;
}
.daily-chest:active { transform:scale(0.97); }
.daily-chest.available {
  animation: chestPulse 1.5s ease-in-out infinite;
  border-color:var(--gold);
  box-shadow: 0 0 20px rgba(241,196,15,0.4);
}
.daily-chest.completed {
  opacity:0.6;
  cursor:default;
  animation:none;
}
@keyframes chestPulse {
  0%,100%{ box-shadow: 0 0 10px rgba(241,196,15,0.3); }
  50%{ box-shadow: 0 0 30px rgba(241,196,15,0.6); }
}
.chest-icon { font-size:40px; }
.chest-text h3 {
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  margin-bottom:4px;
}
.chest-text p { font-size:13px; color:#666; }

.island-nav {
  padding:12px 16px;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}
.island-nav .btn { font-size:9px; padding:10px 16px; flex:1; max-width:180px; }

/* ===== MISSION ===== */
#mission {
  background:var(--bg-dark);
  color:var(--text-light);
  padding:16px;
  align-items:center;
}
.mission-card {
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.15);
  border-radius:16px;
  padding:20px;
  max-width:440px;
  width:100%;
  margin-top:12px;
}
.mission-type-badge {
  font-family:'Press Start 2P',monospace;
  font-size:9px;
  padding:4px 10px;
  border-radius:12px;
  display:inline-block;
  margin-bottom:12px;
}
.badge-comun { background:var(--grass); color:#fff; }
.badge-raro { background:var(--water); color:#fff; }
.badge-epico { background:var(--roblox); color:#fff; }
.mission-title {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(12px,3.5vw,16px);
  margin-bottom:16px;
  line-height:1.6;
  color:var(--gold);
}
.mission-narrative {
  font-size:15px;
  line-height:1.7;
  margin-bottom:20px;
  color:#ccc;
  background:rgba(0,0,0,0.3);
  padding:16px;
  border-radius:10px;
  border-left:4px solid var(--gold);
}
.mob-display {
  text-align:center;
  font-size:64px;
  margin:16px 0;
  animation: mobBounce 1s ease-in-out infinite;
}
@keyframes mobBounce {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}
.combat-options {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.combat-option {
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:10px;
  padding:14px 18px;
  font-size:15px;
  color:#fff;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  font-family:'Nunito',sans-serif;
  font-weight:600;
}
.combat-option:hover { background:rgba(255,255,255,0.18); }
.combat-option:active { transform:scale(0.97); }
.combat-option.correct {
  background:rgba(46,204,113,0.3);
  border-color:#2ecc71;
  animation: correctFlash .5s;
}
.combat-option.incorrect {
  background:rgba(231,76,60,0.3);
  border-color:#e74c3c;
  animation: shake .4s;
}
@keyframes correctFlash {
  0%{ box-shadow:0 0 0 rgba(46,204,113,0); }
  50%{ box-shadow:0 0 30px rgba(46,204,113,0.5); }
  100%{ box-shadow:0 0 0 rgba(46,204,113,0); }
}
@keyframes shake {
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-8px); }
  75%{ transform:translateX(8px); }
}
.exploration-text {
  font-size:15px;
  line-height:1.7;
  margin-bottom:16px;
  color:#ddd;
  background:rgba(0,0,0,0.3);
  padding:16px;
  border-radius:10px;
}
.exploration-options {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.exploration-option {
  background:rgba(155,89,182,0.15);
  border:2px solid rgba(155,89,182,0.3);
  border-radius:10px;
  padding:14px 18px;
  font-size:14px;
  color:#fff;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  font-family:'Nunito',sans-serif;
  font-weight:600;
}
.exploration-option:hover { background:rgba(155,89,182,0.25); }
.exploration-option:active { transform:scale(0.97); }

.btn-flee {
  margin-top:16px;
  background:transparent;
  border:2px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.5);
  font-size:11px;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
}
.btn-flee:hover { border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.8); }

.feedback-box {
  padding:14px;
  border-radius:10px;
  margin-top:12px;
  font-size:14px;
  line-height:1.5;
}
.feedback-correct {
  background:rgba(46,204,113,0.15);
  border:1px solid rgba(46,204,113,0.3);
  color:#2ecc71;
}
.feedback-incorrect {
  background:rgba(231,76,60,0.15);
  border:1px solid rgba(231,76,60,0.3);
  color:#e74c3c;
}

/* ===== VICTORY ===== */
#victory {
  background: radial-gradient(ellipse at center, #2c1654 0%, var(--bg-dark) 70%);
  align-items:center; justify-content:center; text-align:center; padding:20px;
}
.victory-chest {
  font-size:80px;
  animation: victoryBounce 0.8s ease-out;
}
@keyframes victoryBounce {
  0%{ transform:scale(0) rotate(-20deg); opacity:0; }
  60%{ transform:scale(1.2) rotate(5deg); }
  100%{ transform:scale(1) rotate(0); opacity:1; }
}
.victory-title {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(16px,5vw,24px);
  color:var(--gold);
  margin:16px 0 8px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}
.victory-item {
  font-size:56px;
  margin:16px 0;
  animation: itemFloat 2s ease-in-out infinite;
}
@keyframes itemFloat {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
}
.victory-item-name {
  font-family:'Press Start 2P',monospace;
  font-size:12px;
  color:var(--text-light);
  margin-bottom:4px;
}
.victory-rarity {
  font-size:11px;
  font-weight:700;
  margin-bottom:24px;
  padding:4px 12px;
  border-radius:12px;
  display:inline-block;
}
.rarity-comun { background:var(--grass); color:#fff; }
.rarity-raro { background:var(--water); color:#fff; }
.rarity-epico { background:var(--roblox); color:#fff; }
.victory-streak {
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  color:var(--gold);
  margin-bottom:20px;
}
.victory-buttons { display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; }
.victory-buttons .btn { width:100%; }

/* ===== INVENTORY ===== */
#inventory {
  background: linear-gradient(180deg, var(--dirt) 0%, var(--dirt-dark) 100%);
  padding:16px;
}
.inv-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.inv-header h2 {
  font-family:'Press Start 2P',monospace;
  font-size:14px;
  color:#fff;
  text-shadow:2px 2px 0 rgba(0,0,0,0.3);
}
.inv-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.inv-slot {
  aspect-ratio:1;
  background:rgba(0,0,0,0.3);
  border:2px solid rgba(255,255,255,0.15);
  border-radius:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  transition:all .2s;
}
.inv-slot.filled:active { transform:scale(0.93); }
.inv-slot .inv-name {
  font-size:7px;
  font-family:'Press Start 2P',monospace;
  color:rgba(255,255,255,0.7);
  margin-top:4px;
  text-align:center;
  line-height:1.3;
  max-width:100%;
  overflow:hidden;
}
.inv-empty { opacity:0.3; border-style:dashed; }

/* ===== PORTAL ===== */
#portal {
  background:var(--bg-dark);
  padding:16px;
}
.portal-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.portal-header h2 {
  font-family:'Press Start 2P',monospace;
  font-size:13px;
  color:var(--gold);
}
.worlds-grid {
  display:flex;
  flex-direction:column;
  gap:12px;
}
.world-card {
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.12);
  border-radius:12px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:all .2s;
}
.world-card:hover { background:rgba(255,255,255,0.1); }
.world-card:active { transform:scale(0.98); }
.world-icon { font-size:36px; }
.world-info h3 {
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  color:#fff;
  margin-bottom:4px;
}
.world-info p { font-size:12px; color:#999; }
.world-progress {
  margin-left:auto;
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  color:var(--gold);
}

/* ===== ADMIN ===== */
#admin {
  background:#1a1a2e;
  padding:16px;
  color:#fff;
}
.admin-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.admin-header h2 {
  font-family:'Press Start 2P',monospace;
  font-size:12px;
  color:var(--roblox);
}
.admin-section {
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
.admin-section h3 {
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  color:var(--gold);
  margin-bottom:12px;
}
.stat-row {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:14px;
}
.stat-value { font-weight:700; color:var(--gold); }

/* ===== PLACE ITEM MODAL ===== */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.active { display:flex; }
.modal-box {
  background:#fff;
  border-radius:16px;
  padding:24px;
  text-align:center;
  max-width:340px;
  width:100%;
  border:var(--pixel-border);
}
.modal-box h3 {
  font-family:'Press Start 2P',monospace;
  font-size:12px;
  margin-bottom:8px;
}
.modal-item-preview { font-size:48px; margin:12px 0; }
.modal-box p { font-size:14px; color:#666; margin-bottom:16px; }
.modal-buttons { display:flex; gap:8px; justify-content:center; }
.modal-buttons .btn { font-size:9px; padding:10px 14px; }

/* ===== SECRET CODE MODAL ===== */
.code-input {
  display:flex;
  gap:8px;
  justify-content:center;
  margin:16px 0;
}
.code-input input {
  width:48px;
  height:48px;
  text-align:center;
  font-size:20px;
  font-weight:700;
  border:var(--pixel-border);
  border-radius:8px;
  outline:none;
  font-family:'Nunito',sans-serif;
}

/* ===== RESPONSIVE ===== */
@media(min-width:500px){
  .island-grid { max-width:420px; }
}
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div id="splash" class="screen active">
  <h1 class="pixel-font">BlockQuest</h1>
  <p class="subtitle">Tu isla, tus misiones</p>
  <div class="splash-box">
    <label>¿Cómo te llamas?</label>
    <input type="text" id="playerName" placeholder="Tu nombre de aventurero/a" maxlength="16" autocomplete="off">
    <label>Elige tu avatar</label>
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="btn btn-primary" onclick="startGame()" style="width:100%">⚔️ ¡COMENZAR!</button>
  </div>
</div>

<!-- ===== ISLAND ===== -->
<div id="island" class="screen">
  <div class="island-header">
    <div class="player-info">
      <span class="player-avatar" id="islandAvatar"></span>
      <span class="player-name" id="islandName"></span>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>
  <div class="island-grid-wrapper">
    <div class="island-grid" id="islandGrid"></div>
  </div>
  <div class="chest-area">
    <div class="daily-chest" id="dailyChest" onclick="openDailyMission()">
      <span class="chest-icon" id="chestIcon">🎁</span>
      <div class="chest-text">
        <h3 id="chestTitle">Misión del Día</h3>
        <p id="chestSubtitle">¡Toca para descubrir!</p>
      </div>
    </div>
  </div>
  <div class="island-nav">
    <button class="btn btn-gold" onclick="showScreen('portal')">🌍 Portal</button>
    <button class="btn btn-secondary" onclick="showScreen('inventory')">🎒 Inventario</button>
  </div>
  <div style="text-align:center;padding:8px;">
    <span style="font-size:10px;color:rgba(255,255,255,0.3);cursor:pointer;" id="adminTrigger">BlockQuest v1</span>
  </div>
</div>

<!-- ===== MISSION ===== -->
<div id="mission" class="screen">
  <button class="btn-flee" onclick="fleeMission()">← Huir</button>
  <div class="mission-card" id="missionCard"></div>
</div>

<!-- ===== VICTORY ===== -->
<div id="victory" class="screen">
  <div class="victory-chest">🎁</div>
  <h2 class="victory-title">¡Misión Cumplida!</h2>
  <div class="victory-item" id="victoryItemEmoji"></div>
  <div class="victory-item-name" id="victoryItemName"></div>
  <div class="victory-rarity" id="victoryItemRarity"></div>
  <div class="victory-streak" id="victoryStreak"></div>
  <div class="victory-buttons">
    <button class="btn btn-gold" onclick="placeItemFromVictory()">🏝️ Poner en mi isla</button>
    <button class="btn btn-secondary" onclick="saveToInventory()">🎒 Guardar para después</button>
  </div>
</div>

<!-- ===== INVENTORY ===== -->
<div id="inventory" class="screen">

// ===== ESTADO DEL JUEGO =====
let STATE = {};
let BANK = [];
let currentMission = null;
let currentExplorationNode = 0;
let placingItem = null;
let placingCell = null;

function defaultState(){
  return {
    perfil: null,
    isla: Array(6).fill(null).map(()=>Array(6).fill(null)),
    inventario: [],
    completadas: [],
    racha: {actual:0, mejor:0, ultima_fecha:null},
    diaria: {fecha:null, id_mision:null, completada:false}
  };
}

function loadState(){
  try {
    const saved = localStorage.getItem('bq_state');
    if(saved) STATE = JSON.parse(saved);
    else STATE = defaultState();
  } catch(e){ STATE = defaultState(); }
}
function saveState(){ localStorage.setItem('bq_state', JSON.stringify(STATE)); }

// ===== INICIALIZACIÓN =====
function init(){
  loadState();
  BANK = generateBank();
  if(STATE.perfil){
    renderIsland();
    showScreen('island');
  } else {
    renderAvatars();
    showScreen('splash');
  }
  setupAdminTrigger();
  setupCodeInputs();
}

function renderAvatars(){
  const grid = document.getElementById('avatarGrid');
  grid.innerHTML = AVATARS.map(a=>`
    <div class="avatar-option" data-id="${a.id}" onclick="selectAvatar('${a.id}')">
      ${a.emoji}<span>${a.name}</span>
    </div>
  `).join('');
}

let selectedAvatar = null;
function selectAvatar(id){
  selectedAvatar = id;
  document.querySelectorAll('.avatar-option').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id===id);
  });
}

function startGame(){
  const name = document.getElementById('playerName').value.trim();
  if(!name){ document.getElementById('playerName').focus(); return; }
  if(!selectedAvatar){ return; }
  STATE.perfil = { nombre:name, avatar:selectedAvatar, fecha_inicio:todayStr() };
  // Poner un arbolito inicial en la isla
  STATE.isla[2][3] = {id:'arbol_inicio', nombre:'Árbol Inicial', emoji:'🌲'};
  saveState();
  renderIsland();
  showScreen('island');
}

// ===== PANTALLAS =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='island') renderIsland();
  if(id==='inventory') renderInventory();
  if(id==='portal') renderPortal();
  if(id==='admin') renderAdmin();
  window.scrollTo(0,0);
}

// ===== ISLA =====
function renderIsland(){
  if(!STATE.perfil) return;
  const av = AVATARS.find(a=>a.id===STATE.perfil.avatar);
  document.getElementById('islandAvatar').textContent = av?av.emoji:'👾';
  document.getElementById('islandName').textContent = STATE.perfil.nombre;
  document.getElementById('streakBadge').textContent = `🔥 ${STATE.racha.actual}`;
  // Render grid
  const grid = document.getElementById('islandGrid');
  grid.innerHTML = '';
  for(let r=0;r<6;r++){
    for(let c=0;c<6;c++){
      const cell = document.createElement('div');
      cell.className = 'island-cell';
      const item = STATE.isla[r][c];
      if(item){
        cell.textContent = item.emoji;
        cell.classList.add('has-item');
      } else {
        cell.classList.add('empty-slot');
      }
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.onclick = ()=> onCellClick(r,c);
      grid.appendChild(cell);
    }
  }
  // Daily chest
  updateDailyChest();
}

function updateDailyChest(){
  const today = todayStr();
  const chest = document.getElementById('dailyChest');
  const icon = document.getElementById('chestIcon');
  const title = document.getElementById('chestTitle');
  const sub = document.getElementById('chestSubtitle');

  if(!STATE.diaria.fecha || STATE.diaria.fecha !== today){
    // Nueva misión diaria
    const available = BANK.filter(m=> !STATE.completadas.find(c=>c.id_mision===m.id));
    if(available.length === 0){
      icon.textContent = '✅';
      title.textContent = '¡Todo conquistado!';
      sub.textContent = 'Pide nuevas misiones a mamá 😄';
      chest.classList.remove('available');
      chest.classList.add('completed');
      return;
    }
    const chosen = available[Math.floor(Math.random()*available.length)];
    STATE.diaria = {fecha:today, id_mision:chosen.id, completada:false};
    saveState();
  }

  if(STATE.diaria.completada){
    icon.textContent = '✅';
    title.textContent = 'Misión Cumplida';
    sub.textContent = 'Vuelve mañana por otra';
    chest.classList.remove('available');
    chest.classList.add('completed');
  } else {
    const mission = BANK.find(m=>m.id===STATE.diaria.id_mision);
    const rarityEmoji = mission && mission.rareza==='epico' ? '🟣' : mission && mission.rareza==='raro' ? '🔵' : '🟢';
    icon.textContent = '🎁';
    title.textContent = `${rarityEmoji} Misión del Día`;
    sub.textContent = '¡Toca para descubrir!';
    chest.classList.add('available');
    chest.classList.remove('completed');
  }
}

function openDailyMission(){
  if(STATE.diaria.completada) return;
  const mission = BANK.find(m=>m.id===STATE.diaria.id_mision);
  if(!mission) return;
  startMission(mission);
}

// ===== MISIONES =====
function startMission(mission){
  currentMission = mission;
  currentExplorationNode = 0;
  showScreen('mission');
  renderMission();
}

function renderMission(){
  const card = document.getElementById('missionCard');
  const m = currentMission;
  const rarityClass = m.rareza==='epico'?'badge-epico':m.rareza==='raro'?'badge-raro':'badge-comun';
  const rarityLabel = m.rareza==='epico'?'ÉPICO':m.rareza==='raro'?'RARO':'COMÚN';
  const worldInfo = WORLDS.find(w=>w.id===m.mundo);

  if(m.tipo==='combate'){
    const mobEmoji = MOBS[m.combate.mob] || '👾';
    card.innerHTML = `
      <span class="mission-type-badge ${rarityClass}">${rarityLabel}</span>
      <div class="mission-title">${m.titulo}</div>
      <div class="mission-narrative">${m.narrativa.replace(/\n/g,'<br>')}</div>
      <div class="mob-display">${mobEmoji}</div>
      <p style="text-align:center;color:var(--gold);font-family:'Press Start 2P';font-size:10px;margin-bottom:16px;">${m.combate.pregunta}</p>
      <div class="combat-options" id="combatOptions">
        ${m.combate.opciones.map((o,i)=>`
          <div class="combat-option" data-idx="${i}" onclick="selectCombatOption(${i})">${o.texto}</div>
        `).join('')}
      </div>
      <div id="combatFeedback"></div>
    `;
  } else if(m.tipo==='exploracion'){
    renderExplorationNode();
  }
}

function selectCombatOption(idx){
  const opts = currentMission.combate.opciones;
  const selected = opts[idx];
  const optionEls = document.querySelectorAll('.combat-option');

  // Desactivar todos
  optionEls.forEach(el=> el.style.pointerEvents='none');

  if(selected.correcto){
    optionEls[idx].classList.add('correct');
    document.getElementById('combatFeedback').innerHTML = `
      <div class="feedback-box feedback-correct">
        ✅ ${currentMission.combate.feedbackOk}
      </div>
      <button class="btn btn-gold" style="width:100%;margin-top:16px;" onclick="missionVictory()">🎁 ¡Abrir cofre!</button>
    `;
  } else {
    optionEls[idx].classList.add('incorrect');
    document.getElementById('combatFeedback').innerHTML = `
      <div class="feedback-box feedback-incorrect">
        💥 ${currentMission.combate.feedbackFail}
      </div>
      <button class="btn btn-secondary" style="width:100%;margin-top:12px;" onclick="retryCombat()">🔄 Intentar de nuevo</button>
    `;
  }
}

function retryCombat(){
  renderMission();
}

function renderExplorationNode(){
  const card = document.getElementById('missionCard');
  const m = currentMission;
  const nodo = m.exploracion.nodos[currentExplorationNode];
  const rarityClass = m.rareza==='epico'?'badge-epico':m.rareza==='raro'?'badge-raro':'badge-comun';
  const rarityLabel = m.rareza==='epico'?'ÉPICO':m.rareza==='raro'?'RARO':'COMÚN';

  card.innerHTML = `
    <span class="mission-type-badge ${rarityClass}">${rarityLabel}</span>
    <div class="mission-title">${m.titulo}</div>
    <div class="exploration-text">${nodo.texto.replace(/\n/g,'<br>')}</div>
    <div class="exploration-options" id="exploOptions">
      ${nodo.opciones.map((o,i)=>`
        <div class="exploration-option" data-idx="${i}" onclick="selectExploOption(${i})">${o.texto}</div>
      `).join('')}
    </div>
    <div id="exploFeedback"></div>
  `;
}

function selectExploOption(idx){
  const nodo = currentMission.exploracion.nodos[currentExplorationNode];
  const selected = nodo.opciones[idx];
  const optionEls = document.querySelectorAll('.exploration-option');
  optionEls.forEach(el=> el.style.pointerEvents='none');

  if(selected.correcto){
    if(selected.siguiente === 'victoria'){
      optionEls[idx].style.borderColor='#2ecc71';
      optionEls[idx].style.background='rgba(46,204,113,0.2)';
      document.getElementById('exploFeedback').innerHTML = `
        <div class="feedback-box feedback-correct">✅ ¡Correcto!</div>
        <button class="btn btn-gold" style="width:100%;margin-top:16px;" onclick="missionVictory()">🎁 ¡Abrir cofre!</button>
      `;
    } else {
      optionEls[idx].style.borderColor='#2ecc71';
      optionEls[idx].style.background='rgba(46,204,113,0.2)';
      currentExplorationNode = selected.siguiente;
      setTimeout(()=> renderExplorationNode(), 800);
    }
  } else {
    optionEls[idx].style.borderColor='#e74c3c';
    optionEls[idx].style.background='rgba(231,76,60,0.2)';
    document.getElementById('exploFeedback').innerHTML = `
      <div class="feedback-box feedback-incorrect">
        💥 ${selected.feedback}
      </div>
      <button class="btn btn-secondary" style="width:100%;margin-top:12px;" onclick="retryExploration()">🔄 Intentar de nuevo</button>
    `;
  }
}

function retryExploration(){
  renderExplorationNode();
}

function fleeMission(){
  currentMission = null;
  showScreen('island');
}

// ===== VICTORIA =====
function missionVictory(){
  const m = currentMission;
  // Registrar completada
  STATE.completadas.push({
    id_mision: m.id,
    fecha: todayStr(),
    mundo: m.mundo
  });
  // Marcar diaria completada
  if(STATE.diaria.id_mision === m.id){
    STATE.diaria.completada = true;
    updateStreak();
  }
  // Guardar item en inventario
  STATE.inventario.push({...m.item});
  saveState();

  // Mostrar pantalla de victoria
  document.getElementById('victoryItemEmoji').textContent = m.item.emoji;
  document.getElementById('victoryItemName').textContent = m.item.nombre;
  const rarityEl = document.getElementById('victoryItemRarity');
  rarityEl.textContent = m.item.rareza.toUpperCase();
  rarityEl.className = 'victory-rarity rarity-'+m.item.rareza;
  document.getElementById('victoryStreak').textContent = STATE.racha.actual > 1 ? `🔥 Racha: ${STATE.racha.actual} días` : '';

  showScreen('victory');
  // Regenerar banco (para parámetros variables de mate)
  BANK = generateBank();
}

function updateStreak(){
  const today = todayStr();
  const yesterday = yesterdayStr();
  if(STATE.racha.ultima_fecha === yesterday){
    STATE.racha.actual += 1;
  } else if(STATE.racha.ultima_fecha !== today){
    STATE.racha.actual = 1;
  }
  STATE.racha.ultima_fecha = today;
  if(STATE.racha.actual > STATE.racha.mejor) STATE.racha.mejor = STATE.racha.actual;
}

function placeItemFromVictory(){
  const item = STATE.inventario[STATE.inventario.length - 1];
  placingItem = item;
  showScreen('island');
  // Mostrar mensaje
  document.getElementById('modalItemPreview').textContent = item.emoji;
  document.getElementById('modalItemText').textContent = `Toca una celda vacía en tu isla para colocar: ${item.nombre}`;
  document.getElementById('placeModal').classList.add('active');
}

function saveToInventory(){
  showScreen('island');
}

function onCellClick(r,c){
  if(placingItem && !STATE.isla[r][c]){
    placingCell = {r,c};
    confirmPlace();
  }
}

function confirmPlace(){
  if(!placingItem || !placingCell) return;
  STATE.isla[placingCell.r][placingCell.c] = {
    id: placingItem.id,
    nombre: placingItem.nombre,
    emoji: placingItem.emoji
  };
  // Quitar del inventario
  const idx = STATE.inventario.findIndex(i=>i.id===placingItem.id);
  if(idx>-1) STATE.inventario.splice(idx,1);
  placingItem = null;
  placingCell = null;
  document.getElementById('placeModal').classList.remove('active');
  saveState();
  renderIsland();
}

function cancelPlace(){
  placingItem = null;
  placingCell = null;
  document.getElementById('placeModal').classList.remove('active');
}

// ===== INVENTARIO =====
function renderInventory(){
  const grid = document.getElementById('invGrid');
  const items = STATE.inventario;
  let html = '';
  for(let i=0;i<Math.max(items.length,12);i++){
    if(i<items.length){
      html += `<div class="inv-slot filled" onclick="placeFromInventory(${i})">
        ${items[i].emoji}
        <span class="inv-name">${items[i].nombre}</span>
      </div>`;
    } else {
      html += `<div class="inv-slot inv-empty"></div>`;
    }
  }
  grid.innerHTML = html;
}

function placeFromInventory(idx){
  placingItem = STATE.inventario[idx];
  document.getElementById('modalItemPreview').textContent = placingItem.emoji;
  document.getElementById('modalItemText').textContent = `Toca una celda vacía en tu isla para colocar: ${placingItem.nombre}`;
  showScreen('island');
  document.getElementById('placeModal').classList.add('active');
}

// ===== PORTAL =====
function renderPortal(){
  const grid = document.getElementById('worldsGrid');
  grid.innerHTML = WORLDS.map(w=>{
    const total = BANK.filter(m=>m.mundo===w.id).length;
    const done = STATE.completadas.filter(c=>{
      const m = BANK.find(b=>b.id===c.id_mision);
      return m && m.mundo===w.id;
    }).length;
    // Contar completadas de este mundo (pueden estar en bancos anteriores)
    const doneCount = STATE.completadas.filter(c=>c.mundo===w.id).length;
    return `
      <div class="world-card" onclick="openWorld('${w.id}')">
        <span class="world-icon">${w.icon}</span>
        <div class="world-info">
          <h3>${w.name}</h3>
          <p>${w.desc}</p>
        </div>
        <span class="world-progress">${doneCount}/${total}</span>
      </div>
    `;
  }).join('');
}

function openWorld(worldId){
  const missions = BANK.filter(m=>m.mundo===worldId);
  const grid = document.getElementById('worldsGrid');
  const world = WORLDS.find(w=>w.id===worldId);
  grid.innerHTML = `
    <button class="btn btn-secondary" onclick="renderPortal()" style="font-size:9px;padding:8px 12px;align-self:flex-start;">← Mundos</button>
    <h3 style="font-family:'Press Start 2P';font-size:12px;color:#fff;margin:8px 0;">${world.icon} ${world.name}</h3>
    ${missions.map(m=>{
      const done = STATE.completadas.find(c=>c.id_mision===m.id);
      const rarityClass = m.rareza==='epico'?'badge-epico':m.rareza==='raro'?'badge-raro':'badge-comun';
      return `
        <div class="world-card ${done?'':'available'}" onclick="${done?'':'startMissionFromPortal(\"'+m.id+'\")'}" style="${done?'opacity:0.5;':''}">
          <span class="world-icon">${m.item.emoji}</span>
          <div class="world-info">
            <h3 style="font-size:10px;">${m.titulo}</h3>
            <p><span class="mission-type-badge ${rarityClass}" style="font-size:7px;">${m.rareza.toUpperCase()}</span> ${m.tipo==='combate'?'⚔️ Combate':'🗺️ Exploración'}</p>
          </div>
          <span class="world-progress">${done?'✅':'▶️'}</span>
        </div>
      `;
    }).join('')}
  `;
}

function startMissionFromPortal(id){
  const mission = BANK.find(m=>m.id===id);
  if(mission) startMission(mission);
}

// ===== ADMIN =====
function setupAdminTrigger(){
  let taps = 0;
  let timer;
  document.getElementById('adminTrigger').addEventListener('click', ()=>{
    taps++;
    clearTimeout(timer);
    if(taps>=4){
      taps=0;
      document.getElementById('codeModal').classList.add('active');
      document.querySelector('.code-digit').focus();
    }
    timer = setTimeout(()=>taps=0, 2000);
  });
}

function setupCodeInputs(){
  const digits = document.querySelectorAll('.code-digit');
  digits.forEach((input,i)=>{
    input.addEventListener('input', (e)=>{
      const val = e.target.value;
      if(val.length > 1) e.target.value = val.slice(-1);
      if(val && i<3) digits[i+1].focus();
    });
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Backspace' && !e.target.value && i>0) digits[i-1].focus();
    });
  });
}

function checkCode(){
  const digits = document.querySelectorAll('.code-digit');
  const code = Array.from(digits).map(d=>d.value).join('');
  if(code===ADMIN_CODE){
    closeCodeModal();
    showScreen('admin');
  } else {
    digits.forEach(d=>{d.value=''; d.style.borderColor='#e74c3c';});
    setTimeout(()=> digits.forEach(d=>d.style.borderColor=''), 1000);
    digits[0].focus();
  }
}

function closeCodeModal(){
  document.getElementById('codeModal').classList.remove('active');
  document.querySelectorAll('.code-digit').forEach(d=>d.value='');
}

function renderAdmin(){
  const content = document.getElementById('adminContent');
  const totalDone = STATE.completadas.length;
  const byWorld = WORLDS.map(w=>{
    const count = STATE.completadas.filter(c=>c.mundo===w.id).length;

  });

  const itemsOnIsland = STATE.isla.flat().filter(Boolean).length;
  const itemsInInv = STATE.inventario.length;

  content.innerHTML = `
    <div class="admin-section">
      <h3>📊 Estadísticas Generales</h3>
      <div class="stat-row"><span>Misiones completadas</span><span class="stat-value">${totalDone} / ${totalMissions}</span></div>
      <div class="stat-row"><span>Racha actual</span><span class="stat-value">🔥 ${STATE.racha.actual} días</span></div>
      <div class="stat-row"><span>Mejor racha</span><span class="stat-value">🏆 ${STATE.racha.mejor} días</span></div>
      <div class="stat-row"><span>Items en isla</span><span class="stat-value">🏝️ ${itemsOnIsland}</span></div>
      <div class="stat-row"><span>Items en inventario</span><span class="stat-value">🎒 ${itemsInInv}</span></div>
      <div class="stat-row"><span>Jugando desde</span><span class="stat-value">${STATE.perfil?STATE.perfil.fecha_inicio:'—'}</span></div>
    </div>
    <div class="admin-section">
      <h3>🌍 Progreso por Mundo (Materia)</h3>
      ${byWorld.map(w=>`
        <div class="stat-row"><span>${w.icon} ${w.name}</span><span class="stat-value">${w.count} completadas</span></div>
      `).join('')}
    </div>
    <div class="admin-section">
      <h3>📋 Historial de Misiones</h3>
      ${STATE.completadas.length===0?'<p style="color:#999;font-size:13px;">Aún no hay misiones completadas.</p>':''}
      ${STATE.completadas.slice().reverse().map(c=>{
        const world = WORLDS.find(w=>w.id===c.mundo);
        return `<div class="stat-row">
          <span>${world?world.icon:'❓'} ${c.id_mision}</span>
          <span style="color:#999;font-size:12px;">${c.fecha}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="admin-section">
      <h3>💾 Respaldo</h3>
      <p style="font-size:13px;color:#999;margin-bottom:12px;">Copia el progreso de Magdalena para no perderlo si se limpia el caché.</p>
      <button class="btn btn-gold" onclick="exportBackup()" style="width:100%;margin-bottom:8px;font-size:9px;">📋 Copiar respaldo</button>
      <button class="btn btn-secondary" onclick="importBackup()" style="width:100%;font-size:9px;">📥 Restaurar respaldo</button>
    </div>
    <div class="admin-section">
      <h3>⚠️ Zona de peligro</h3>
      <button class="btn" style="width:100%;font-size:9px;background:#e74c3c;color:#fff;border-color:#c0392b;" onclick="resetGame()">🗑️ Reiniciar todo</button>
    </div>
  `;
}

function exportBackup(){
  const data = JSON.stringify(STATE);
  navigator.clipboard.writeText(data).then(()=>{
    alert('✅ Respaldo copiado al portapapeles. Guárdalo en un lugar seguro.');
  }).catch(()=>{
    prompt('Copia este texto:', data);
  });
}

function importBackup(){
  const data = prompt('Pega aquí el texto de respaldo:');
  if(data){
    try {
      STATE = JSON.parse(data);
      saveState();
      alert('✅ Respaldo restaurado. La app se va a recargar.');
      location.reload();
    } catch(e){
      alert('❌ El texto no es un respaldo válido.');
    }
  }
}

function resetGame(){
  if(confirm('⚠️ ¿Estás segura? Se borrará TODO el progreso de Magdalena.')){
    if(confirm('🔴 ÚLTIMA OPORTUNIDAD. ¿Realmente quieres borrar todo?')){
      localStorage.removeItem('bq_state');
      location.reload();
    }
  }
}

// ===== UTILIDADES =====
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yesterdayStr(){
  const d=new Date();
  d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ===== ARRANCAR =====
window.addEventListener('DOMContentLoaded', init);
</script>
