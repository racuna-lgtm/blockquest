<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--grass:#5D8C2E;--grass-dark:#4A7024;--dirt:#8B6914;--dirt-dark:#6B4F0E;--sky:#7EC8E3;--sky-dark:#5BA3C9;--gold:#F1C40F;--gold-dark:#D4AC0D;--roblox:#9B59B6;--water:#3498DB;--text-dark:#2C3E50;--text-light:#ECF0F1;--bg-dark:#1a1a2e;--bg-card:rgba(255,255,255,0.95);--pixel-border:3px solid #2C3E50}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg-dark);color:var(--text-dark);min-height:100vh;overflow-x:hidden;user-select:none}
.screen{display:none;min-height:100vh;position:relative}.screen.active{display:flex;flex-direction:column}
#splash{background:linear-gradient(180deg,var(--sky) 0%,var(--sky-dark) 40%,var(--grass) 40%,var(--grass-dark) 60%,var(--dirt) 60%,var(--dirt-dark) 100%);align-items:center;justify-content:center;padding:20px;text-align:center}
#splash h1{font-family:'Press Start 2P',monospace;font-size:clamp(28px,8vw,48px);color:#fff;text-shadow:4px 4px 0 var(--grass-dark);margin-bottom:8px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#splash .subtitle{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,12px);color:var(--gold);margin-bottom:30px;text-shadow:2px 2px 0 rgba(0,0,0,0.4)}
.splash-box{background:var(--bg-card);border-radius:12px;padding:24px;width:100%;max-width:380px;border:var(--pixel-border)}
.splash-box label{display:block;font-weight:700;font-size:14px;margin-bottom:8px}
.splash-box input[type="text"]{width:100%;padding:12px;border:var(--pixel-border);border-radius:8px;font-family:'Nunito',sans-serif;font-size:16px;margin-bottom:16px;outline:none}
.avatar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.avatar-option{aspect-ratio:1;border:3px solid #ccc;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:36px;transition:all .2s;background:#f9f9f9}
.avatar-option span{font-size:10px;margin-top:4px;font-weight:700}
.avatar-option.selected{border-color:var(--grass);background:#e8f5e9;transform:scale(1.08)}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,14px);padding:14px 28px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;border:var(--pixel-border)}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--grass);color:#fff}.btn-gold{background:var(--gold);color:var(--text-dark)}.btn-secondary{background:#ecf0f1;color:var(--text-dark)}.btn-roblox{background:var(--roblox);color:#fff}

/* Tutorial */
.tut-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.tut-overlay.hidden{display:none}
.tut-card{background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;text-align:center;border:var(--pixel-border)}
.tut-card .te{font-size:56px;margin-bottom:12px}
.tut-card h3{font-family:'Press Start 2P',monospace;font-size:13px;margin-bottom:12px;line-height:1.6}
.tut-card p{font-size:15px;color:#555;margin-bottom:20px;line-height:1.6}
.tut-dots{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.tut-dot{width:10px;height:10px;border-radius:50%;background:#ddd}.tut-dot.on{background:var(--grass)}

/* Island */
#island{background:linear-gradient(180deg,var(--sky) 0%,var(--sky-dark) 35%,transparent 35%);background-color:var(--grass);padding-bottom:20px}
.island-header{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.player-info{display:flex;align-items:center;gap:10px}
.player-avatar{font-size:32px}
.player-name{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,14px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,0.3)}
.streak-badge{font-family:'Press Start 2P',monospace;font-size:11px;background:rgba(0,0,0,0.3);color:var(--gold);padding:6px 12px;border-radius:20px}
.island-label{text-align:center;font-size:12px;color:rgba(255,255,255,0.6);padding:4px 0}
.island-grid-wrapper{padding:4px 12px;display:flex;justify-content:center}
.island-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;width:100%;max-width:340px;background:var(--dirt-dark);border:4px solid var(--dirt-dark);border-radius:8px;padding:2px}
.island-cell{background:var(--grass);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4.5vw,24px);aspect-ratio:1;transition:all .15s}
.island-cell.has-item{background:#4a8c1e}
.island-cell.placeable{background:var(--grass-dark);cursor:pointer;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:inset 0 0 0 rgba(241,196,15,0)}50%{box-shadow:inset 0 0 8px rgba(241,196,15,0.5)}}

.chest-area{padding:16px;display:flex;justify-content:center}
.daily-chest{background:var(--bg-card);border:4px solid var(--gold);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;max-width:380px;width:100%;box-shadow:0 0 20px rgba(241,196,15,0.3)}
.daily-chest:active{transform:scale(0.97)}
.daily-chest.available{animation:glow 1.5s ease-in-out infinite}
.daily-chest.completed{opacity:0.6;cursor:default;animation:none;border-color:#ccc;box-shadow:none}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(241,196,15,0.3)}50%{box-shadow:0 0 35px rgba(241,196,15,0.6)}}
.chest-icon{font-size:44px}
.chest-text h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:6px}
.chest-text p{font-size:14px;color:#666}
.chest-arrow{margin-left:auto;font-size:28px;animation:arrowB 1s ease-in-out infinite}
@keyframes arrowB{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
.island-nav{padding:12px 16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.island-nav .btn{font-size:9px;padding:10px 16px;flex:1;max-width:180px}
.placing-banner{background:var(--gold);color:var(--text-dark);text-align:center;padding:10px;font-family:'Press Start 2P',monospace;font-size:9px;line-height:1.5;display:none}
.placing-banner.active{display:block}

/* Mission */
#mission{background:var(--bg-dark);color:var(--text-light);padding:16px;align-items:center}
.mission-card{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:16px;padding:20px;max-width:440px;width:100%;margin-top:12px}
.badge{font-family:'Press Start 2P',monospace;font-size:9px;padding:4px 10px;border-radius:12px;display:inline-block;margin-bottom:12px}
.badge-c{background:var(--grass);color:#fff}.badge-r{background:var(--water);color:#fff}.badge-e{background:var(--roblox);color:#fff}
.m-title{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3.5vw,16px);margin-bottom:16px;line-height:1.6;color:var(--gold)}
.m-narr{font-size:15px;line-height:1.7;margin-bottom:20px;color:#ccc;background:rgba(0,0,0,0.3);padding:16px;border-radius:10px;border-left:4px solid var(--gold)}
.m-q{text-align:center;color:var(--gold);font-family:'Press Start 2P',monospace;font-size:10px;margin-bottom:16px;line-height:1.6}
.mob{text-align:center;font-size:64px;margin:12px 0;animation:bounce 1s ease-in-out infinite}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;padding:14px 18px;font-size:15px;color:#fff;cursor:pointer;transition:all .2s;text-align:left;font-family:'Nunito',sans-serif;font-weight:600}
.opt:hover{background:rgba(255,255,255,0.18)}
.opt.ok{background:rgba(46,204,113,0.3)!important;border-color:#2ecc71!important}
.opt.no{background:rgba(231,76,60,0.3)!important;border-color:#e74c3c!important;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.btn-flee{margin-top:16px;background:transparent;border:2px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-size:11px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif}
.fb{padding:14px;border-radius:10px;margin-top:12px;font-size:14px;line-height:1.6}
.fb-ok{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);color:#2ecc71}
.fb-no{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:#e74c3c}

/* Victory */
#victory{background:radial-gradient(ellipse at center,#2c1654 0%,var(--bg-dark) 70%);align-items:center;justify-content:center;text-align:center;padding:20px}
.v-chest{font-size:80px;animation:vb .8s ease-out}
@keyframes vb{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.v-title{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5vw,24px);color:var(--gold);margin:16px 0 8px;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.v-item{font-size:56px;margin:16px 0;animation:fl 2s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.v-name{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--text-light);margin-bottom:4px}
.v-rar{font-size:11px;font-weight:700;margin-bottom:24px;padding:4px 12px;border-radius:12px;display:inline-block}
.r-c{background:var(--grass);color:#fff}.r-r{background:var(--water);color:#fff}.r-e{background:var(--roblox);color:#fff}
.v-streak{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:20px}
.v-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}.v-btns .btn{width:100%}

/* Inventory */
#inventory{background:linear-gradient(180deg,var(--dirt) 0%,var(--dirt-dark) 100%);padding:16px}
.inv-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.inv-h h2{font-family:'Press Start 2P',monospace;font-size:14px;color:#fff}
.inv-empty{text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:40px 20px;line-height:1.6}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.inv-slot{aspect-ratio:1;background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.inv-slot .inv-n{font-size:7px;font-family:'Press Start 2P',monospace;color:rgba(255,255,255,0.7);margin-top:4px;text-align:center;line-height:1.3}

/* Portal */
#portal{background:var(--bg-dark);padding:16px}
.portal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.portal-h h2{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold)}
.wg{display:flex;flex-direction:column;gap:12px}
.wc{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.wc:active{transform:scale(0.98)}
.wi{font-size:36px}
.winfo h3{font-family:'Press Start 2P',monospace;font-size:10px;color:#fff;margin-bottom:4px}
.winfo p{font-size:12px;color:#999}
.wp{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold)}

/* Admin */
#admin{background:#1a1a2e;padding:16px;color:#fff}
.admin-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.admin-h h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--roblox)}
.as{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-bottom:16px}
.as h3{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:12px}
.sr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:14px}
.sv{font-weight:700;color:var(--gold)}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.mbox{background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:340px;width:100%;border:var(--pixel-border)}
.mbox h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:8px}
.mbox p{font-size:14px;color:#666;margin-bottom:16px}
.mbtn{display:flex;gap:8px;justify-content:center}.mbtn .btn{font-size:9px;padding:10px 14px}
.code-input{display:flex;gap:8px;justify-content:center;margin:16px 0}
.code-input input{width:48px;height:48px;text-align:center;font-size:20px;font-weight:700;border:var(--pixel-border);border-radius:8px;outline:none;font-family:'Nunito',sans-serif}
</style>
</head>
<body>

<div class="tut-overlay hidden" id="tut">
  <div class="tut-card">
    <div class="te" id="tutE">🎁</div>
    <h3 id="tutT"></h3>
    <p id="tutP"></p>
    <div class="tut-dots" id="tutD"></div>
    <button class="btn btn-primary" onclick="nextTut()" id="tutB" style="width:100%"></button>
  </div>
</div>

<div id="splash" class="screen active">
  <h1>BlockQuest</h1>
  <p class="subtitle">Tu isla, tus misiones</p>
  <div class="splash-box">
    <label>¿Cómo te llamas?</label>
    <input type="text" id="pName" placeholder="Tu nombre" maxlength="16" autocomplete="off">
    <label>Elige tu avatar</label>
    <div class="avatar-grid" id="avGrid"></div>
    <button class="btn btn-primary" onclick="startGame()" style="width:100%">⚔️ ¡COMENZAR!</button>
  </div>
</div>

<div id="island" class="screen">
  <div class="placing-banner" id="pBanner">📍 Toca una celda verde para colocar tu item<br><span style="font-family:Nunito;font-size:12px;cursor:pointer;text-decoration:underline" onclick="cancelPlace()">Cancelar</span></div>
  <div class="island-header">
    <div class="player-info"><span class="player-avatar" id="iAv"></span><span class="player-name" id="iName"></span></div>
    <div class="streak-badge" id="sBadge">🔥 0</div>
  </div>
  <div class="island-label" id="iLabel">🏝️ Tu isla</div>
  <div class="island-grid-wrapper"><div class="island-grid" id="iGrid"></div></div>
  <div class="chest-area">
    <div class="daily-chest" id="dChest" onclick="openDaily()">
      <span class="chest-icon" id="cIcon">🎁</span>
      <div class="chest-text"><h3 id="cTitle">👆 TOCA AQUÍ 👆</h3><p id="cSub">Abre tu misión del día</p></div>
      <span class="chest-arrow" id="cArr">▶</span>
    </div>
  </div>
  <div class="island-nav">
    <button class="btn btn-gold" onclick="showScreen('portal')">🌍 Más Misiones</button>
    <button class="btn btn-secondary" onclick="showScreen('inventory')">🎒 Inventario</button>
  </div>
  <div style="text-align:center;padding:8px"><span style="font-size:10px;color:rgba(255,255,255,0.3);cursor:pointer" id="adTrig">BlockQuest v1.1</span></div>
</div>

<div id="mission" class="screen">
  <button class="btn-flee" onclick="flee()">← Volver</button>
  <div class="mission-card" id="mCard"></div>
</div>

<div id="victory" class="screen">
  <div class="v-chest">🎁</div>
  <h2 class="v-title">¡Misión Cumplida!</h2>
  <div class="v-item" id="vEmoji"></div>
  <div class="v-name" id="vName"></div>
  <div class="v-rar" id="vRar"></div>
  <div class="v-streak" id="vStreak"></div>
  <div class="v-btns">
    <button class="btn btn-gold" onclick="placeFromVictory()">🏝️ Poner en mi isla</button>
    <button class="btn btn-secondary" onclick="showScreen('island')">🎒 Guardar</button>
  </div>
</div>

<div id="inventory" class="screen">
  <div class="inv-h"><h2>🎒 Inventario</h2><button class="btn btn-secondary" onclick="showScreen('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div>
  <div id="invC"></div>
</div>

<div id="portal" class="screen">
  <div class="portal-h"><h2>🌍 Portal de Aventuras</h2><button class="btn btn-secondary" onclick="showScreen('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div>
  <div class="wg" id="wGrid"></div>
</div>

<div id="admin" class="screen">
  <div class="admin-h"><h2>🔮 Panel Mamá</h2><button class="btn btn-secondary" onclick="showScreen('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div>
  <div id="adC"></div>
</div>

<div class="modal" id="codeM">
  <div class="mbox">
    <h3>🔒 Código Secreto</h3><p>Ingresa 4 dígitos</p>
    <div class="code-input"><input type="number" maxlength="1" class="cd" data-i="0"><input type="number" maxlength="1" class="cd" data-i="1"><input type="number" maxlength="1" class="cd" data-i="2"><input type="number" maxlength="1" class="cd" data-i="3"></div>
    <div class="mbtn"><button class="btn btn-roblox" onclick="checkCode()">Entrar</button><button class="btn btn-secondary" onclick="closeCode()">Cancelar</button></div>
  </div>
</div>

<script>
const CODE='2017';
const AVS=[{id:'creeper',e:'👾',n:'Creeper'},{id:'warrior',e:'⚔️',n:'Guerrera'},{id:'cat',e:'🐱',n:'Gatita'},{id:'star',e:'⭐',n:'Estrella'},{id:'flower',e:'🌸',n:'Flor'},{id:'dragon',e:'🐉',n:'Dragón'}];
const WS=[{id:'lab',n:'Laboratorio de Pociones',i:'⚗️',d:'Lógica y números'},{id:'castillo',n:'Castillo Antiguo',i:'🏰',d:'Civilizaciones y geografía'},{id:'volcan',n:'Volcán de Fuego',i:'🌋',d:'Naturaleza y ciencia'},{id:'biblioteca',n:'Biblioteca Encantada',i:'📜',d:'Palabras y textos'},{id:'tierra',n:'Tierra Desconocida',i:'🗺️',d:'English adventures'}];
const MOBS={alquimista:'🧙',creeper:'💚',capitan:'🏴‍☠️',virus:'🦠',libro:'📖',fantasma:'👻',trickster:'🎭'};

const TUT=[
  {e:'🎁',t:'¡Cada día un cofre!',p:'Todos los días aparece una misión nueva. Toca el cofre dorado para empezar.'},
  {e:'⚔️',t:'Resuelve el desafío',p:'Lee la historia y elige la respuesta correcta. ¡Cuidado, el orden cambia cada vez!'},
  {e:'🏝️',t:'Construye tu isla',p:'Cada misión te da un item. ¡Ponlo en tu isla y mírala crecer!'},
  {e:'🌍',t:'Explora los mundos',p:'Toca "Más Misiones" para elegir qué mundo explorar.'}
];
let tStep=0;
function showTut(){tStep=0;document.getElementById('tut').classList.remove('hidden');renderTut();}
function renderTut(){const s=TUT[tStep];document.getElementById('tutE').textContent=s.e;document.getElementById('tutT').textContent=s.t;document.getElementById('tutP').textContent=s.p;document.getElementById('tutB').textContent=tStep<TUT.length-1?'Siguiente →':'¡A jugar! 🎮';document.getElementById('tutD').innerHTML=TUT.map((_,i)=>`<div class="tut-dot ${i===tStep?'on':''}"></div>`).join('');}
function nextTut(){tStep++;if(tStep>=TUT.length){document.getElementById('tut').classList.add('hidden');S.tutDone=true;save();}else renderTut();}

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function genBank(){
  return[
    {id:'lab_001',w:'lab',t:'combate',r:'epico',titulo:'El Patrón del Alquimista',
     narr:'El Alquimista tiene una secuencia mágica:\n\n2, 6, 18, 54...\n\nCada número se obtiene haciendo LO MISMO con el anterior. ¿Cuál es el siguiente?',
     combat:{mob:'alquimista',q:'¿Qué número sigue?',
       opts:[{tx:'162',ok:true},{tx:'108',ok:false},{tx:'72',ok:false}],
       fOk:'¡Exacto! Cada número se multiplica por 3: 2→6→18→54→162.',
       fNo:'Fíjate: 2×3=6, 6×3=18, 18×3=54... ¿qué operación se repite?'},
     item:{id:'estrella_1',n:'Estrella Guía',r:'epico',e:'⭐'}},

// STATE
let S={},BANK=[],curM=null,curN=0,plItem=null;
function defS(){return{perfil:null,isla:Array(6).fill(null).map(()=>Array(6).fill(null)),inv:[],done:[],racha:{a:0,m:0,u:null},diaria:{f:null,id:null,c:false},tutDone:false};}
function load(){try{const s=localStorage.getItem('bq');S=s?JSON.parse(s):defS();}catch(e){S=defS();}}
function save(){localStorage.setItem('bq',JSON.stringify(S));}

function init(){
  load();BANK=genBank();
  if(S.perfil){renderIsland();showScreen('island');if(!S.tutDone)showTut();}
  else{renderAv();showScreen('splash');}
  setupAdmin();setupCode();
}

function renderAv(){document.getElementById('avGrid').innerHTML=AVS.map(a=>`<div class="avatar-option" data-id="${a.id}" onclick="selAv('${a.id}')">${a.e}<span>${a.n}</span></div>`).join('');}
let selAvatar=null;
function selAv(id){selAvatar=id;document.querySelectorAll('.avatar-option').forEach(el=>el.classList.toggle('selected',el.dataset.id===id));}
function startGame(){
  const n=document.getElementById('pName').value.trim();
  if(!n||!selAvatar)return;
  S.perfil={nombre:n,avatar:selAvatar,fi:todayS()};
  S.isla[2][3]={id:'arbol_0',n:'Árbol Inicial',e:'🌲'};
  save();renderIsland();showScreen('island');showTut();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='island')renderIsland();if(id==='inventory')renderInv();if(id==='portal')renderPortal();if(id==='admin')renderAdmin();
  window.scrollTo(0,0);
}

// ISLAND
function renderIsland(){
  if(!S.perfil)return;
  const av=AVS.find(a=>a.id===S.perfil.avatar);
  document.getElementById('iAv').textContent=av?av.e:'👾';
  document.getElementById('iName').textContent=S.perfil.nombre;
  document.getElementById('sBadge').textContent=`🔥 ${S.racha.a}`;
  const g=document.getElementById('iGrid');g.innerHTML='';
  for(let r=0;r<6;r++)for(let c=0;c<6;c++){
    const cell=document.createElement('div');cell.className='island-cell';
    const it=S.isla[r][c];
    if(it){cell.textContent=it.e;cell.classList.add('has-item');}
    if(plItem&&!it){cell.classList.add('placeable');cell.onclick=()=>placeOn(r,c);}
    g.appendChild(cell);
  }
  document.getElementById('pBanner').classList.toggle('active',!!plItem);
  document.getElementById('iLabel').textContent=plItem?'':'🏝️ Tu isla — completa misiones para llenarla';
  updateChest();
}

function updateChest(){
  const today=todayS(),ch=document.getElementById('dChest'),ic=document.getElementById('cIcon'),ti=document.getElementById('cTitle'),su=document.getElementById('cSub'),ar=document.getElementById('cArr');
  if(!S.diaria.f||S.diaria.f!==today){
    const avail=BANK.filter(m=>!S.done.find(d=>d.id===m.id));
    if(!avail.length){ic.textContent='✅';ti.textContent='¡Todo conquistado!';su.textContent='Pide nuevas misiones a mamá 😄';ch.classList.remove('available');ch.classList.add('completed');ar.textContent='';return;}
    const pick=avail[Math.floor(Math.random()*avail.length)];
    S.diaria={f:today,id:pick.id,c:false};save();
  }
  if(S.diaria.c){ic.textContent='✅';ti.textContent='¡Misión cumplida!';su.textContent='Vuelve mañana o toca "Más Misiones"';ch.classList.remove('available');ch.classList.add('completed');ar.textContent='';}
  else{ic.textContent='🎁';ti.textContent='👆 TOCA AQUÍ 👆';su.textContent='Abre tu misión del día';ch.classList.add('available');ch.classList.remove('completed');ar.textContent='▶';}
}

function openDaily(){if(S.diaria.c)return;const m=BANK.find(b=>b.id===S.diaria.id);if(m)startM(m);}

// MISSIONS
function startM(m){curM=m;curN=0;showScreen('mission');renderM();}
function renderM(){
  const c=document.getElementById('mCard'),m=curM;
  const bc=m.r==='epico'?'badge-e':m.r==='raro'?'badge-r':'badge-c';
  const bl=m.r==='epico'?'ÉPICO':m.r==='raro'?'RARO':'COMÚN';
  if(m.t==='combate'){
    const mob=MOBS[m.combat.mob]||'👾';
    const opts=shuf(m.combat.opts.map((o,i)=>({...o,oi:i})));
    c.innerHTML=`<span class="badge ${bc}">${bl}</span><div class="m-title">${m.titulo}</div><div class="m-narr">${m.narr.replace(/\n/g,'<br>')}</div><div class="mob">${mob}</div><p class="m-q">${m.combat.q}</p><div class="opts" id="copts">${opts.map(o=>`<div class="opt" data-ok="${o.ok}" onclick="pickC(this)">${o.tx}</div>`).join('')}</div><div id="cfb"></div>`;
  } else renderExplo();
}

function pickC(el){
  const ok=el.dataset.ok==='true';
  document.querySelectorAll('.opt').forEach(e=>e.style.pointerEvents='none');
  el.classList.add(ok?'ok':'no');
  document.getElementById('cfb').innerHTML=ok
    ?`<div class="fb fb-ok">✅ ${curM.combat.fOk}</div><button class="btn btn-gold" style="width:100%;margin-top:16px" onclick="win()">🎁 ¡Abrir cofre!</button>`
    :`<div class="fb fb-no">💥 ${curM.combat.fNo}</div><button class="btn btn-secondary" style="width:100%;margin-top:12px" onclick="renderM()">🔄 Intentar de nuevo</button>`;
}

function renderExplo(){
  const c=document.getElementById('mCard'),m=curM,nd=m.explo.nodos[curN];
  const bc=m.r==='epico'?'badge-e':m.r==='raro'?'badge-r':'badge-c';
  const bl=m.r==='epico'?'ÉPICO':m.r==='raro'?'RARO':'COMÚN';
  const opts=shuf(nd.opts.map((o,i)=>({...o,oi:i})));
  c.innerHTML=`<span class="badge ${bc}">${bl}</span><div class="m-title">${m.titulo}</div><div class="m-narr">${nd.tx.replace(/\n/g,'<br>')}</div><div class="opts">${opts.map(o=>`<div class="opt" onclick="pickE(this,${o.oi})">${o.tx}</div>`).join('')}</div><div id="efb"></div>`;
}

function pickE(el,oi){
  const nd=curM.explo.nodos[curN],sel=nd.opts[oi];
  document.querySelectorAll('.opt').forEach(e=>e.style.pointerEvents='none');
  if(sel.ok){
    el.classList.add('ok');
    if(sel.sig==='win') document.getElementById('efb').innerHTML=`<div class="fb fb-ok">✅ ¡Correcto!</div><button class="btn btn-gold" style="width:100%;margin-top:16px" onclick="win()">🎁 ¡Abrir cofre!</button>`;
    else{curN=sel.sig;setTimeout(renderExplo,800);}
  } else{
    el.classList.add('no');
    document.getElementById('efb').innerHTML=`<div class="fb fb-no">💥 ${sel.fb}</div><button class="btn btn-secondary" style="width:100%;margin-top:12px" onclick="renderExplo()">🔄 Intentar de nuevo</button>`;
  }
}

function flee(){curM=null;showScreen('island');}

// VICTORY
function win(){
  const m=curM;
  S.done.push({id:m.id,f:todayS(),w:m.w});
  if(S.diaria.id===m.id){S.diaria.c=true;updStreak();}
  S.inv.push({id:m.item.id,n:m.item.n,r:m.item.r,e:m.item.e});
  save();
  document.getElementById('vEmoji').textContent=m.item.e;
  document.getElementById('vName').textContent=m.item.n;
  const re=document.getElementById('vRar');re.textContent=m.item.r.toUpperCase();re.className='v-rar r-'+m.item.r[0];
  document.getElementById('vStreak').textContent=S.racha.a>1?`🔥 Racha: ${S.racha.a} días`:'';
  showScreen('victory');BANK=genBank();
}

function updStreak(){
  const t=todayS(),y=yesterdayS();
  if(S.racha.u===y)S.racha.a+=1;else if(S.racha.u!==t)S.racha.a=1;
  S.racha.u=t;if(S.racha.a>S.racha.m)S.racha.m=S.racha.a;
}

// PLACING
function placeFromVictory(){plItem=S.inv[S.inv.length-1];showScreen('island');}
function placeOn(r,c){
  if(!plItem||S.isla[r][c])return;
  S.isla[r][c]={id:plItem.id,n:plItem.n,e:plItem.e};
  const i=S.inv.findIndex(x=>x.id===plItem.id);if(i>-1)S.inv.splice(i,1);
  plItem=null;save();renderIsland();
}
function cancelPlace(){plItem=null;renderIsland();}
function placeFromInv(i){plItem=S.inv[i];showScreen('island');}

// INVENTORY
function renderInv(){
  const c=document.getElementById('invC');
  if(!S.inv.length){c.innerHTML='<div class="inv-empty">🎒 Vacío.<br><br>Completa misiones para ganar items.</div>';return;}
  c.innerHTML=`<div class="inv-grid">${S.inv.map((it,i)=>`<div class="inv-slot" onclick="placeFromInv(${i})">${it.e}<span class="inv-n">${it.n}</span></div>`).join('')}</div>`;
}

// PORTAL
function renderPortal(){
  document.getElementById('wGrid').innerHTML=WS.map(w=>{
    const tot=BANK.filter(m=>m.w===w.id).length,dn=S.done.filter(d=>d.w===w.id).length;
    return`<div class="wc" onclick="openW('${w.id}')"><span class="wi">${w.i}</span><div class="winfo"><h3>${w.n}</h3><p>${w.d}</p></div><span class="wp">${dn}/${tot}</span></div>`;
  }).join('');
}
function openW(wid){
  const ms=BANK.filter(m=>m.w===wid),w=WS.find(x=>x.id===wid);
  document.getElementById('wGrid').innerHTML=`
    <button class="btn btn-secondary" onclick="renderPortal()" style="font-size:9px;padding:8px 12px;align-self:flex-start">← Mundos</button>
    <h3 style="font-family:'Press Start 2P';font-size:12px;color:#fff;margin:8px 0">${w.i} ${w.n}</h3>
    ${ms.map(m=>{
      const dn=S.done.find(d=>d.id===m.id);
      const bc=m.r==='epico'?'badge-e':m.r==='raro'?'badge-r':'badge-c';
      return`<div class="wc" onclick="${dn?'':'startMP(\"'+m.id+'\")'}" style="${dn?'opacity:0.5':''}"><span class="wi">${m.item.e}</span><div class="winfo"><h3 style="font-size:10px">${m.titulo}</h3><p><span class="badge ${bc}" style="font-size:7px">${m.r.toUpperCase()}</span> ${m.t==='combate'?'⚔️':'🗺️'}</p></div><span class="wp">${dn?'✅':'▶️'}</span></div>`;
    }).join('')}`;
}
function startMP(id){const m=BANK.find(b=>b.id===id);if(m)startM(m);}

// ADMIN
function setupAdmin(){let t=0,ti;document.getElementById('adTrig').addEventListener('click',()=>{t++;clearTimeout(ti);if(t>=4){t=0;document.getElementById('codeM').classList.add('active');document.querySelector('.cd').focus();}ti=setTimeout(()=>t=0,2000);});}
function setupCode(){document.querySelectorAll('.cd').forEach((inp,i)=>{inp.addEventListener('input',e=>{if(e.target.value.length>1)e.target.value=e.target.value.slice(-1);if(e.target.value&&i<3)document.querySelectorAll('.cd')[i+1].focus();});inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)document.querySelectorAll('.cd')[i-1].focus();});});}
function checkCode(){const c=Array.from(document.querySelectorAll('.cd')).map(d=>d.value).join('');if(c===CODE){closeCode();showScreen('admin');}else{document.querySelectorAll('.cd').forEach(d=>{d.value='';d.style.borderColor='#e74c3c';});setTimeout(()=>document.querySelectorAll('.cd').forEach(d=>d.style.borderColor=''),1000);document.querySelector('.cd').focus();}}
function closeCode(){document.getElementById('codeM').classList.remove('active');document.querySelectorAll('.cd').forEach(d=>d.value='');}

function renderAdmin(){
  const c=document.getElementById('adC'),bw=WS.map(w=>({...w,c:S.done.filter(x=>x.w===w.id).length}));
  c.innerHTML=`
    <div class="as"><h3>📊 Estadísticas</h3>
      <div class="sr"><span>Misiones completadas</span><span class="sv">${S.done.length} / ${BANK.length}</span></div>
      <div class="sr"><span>Racha actual</span><span class="sv">🔥 ${S.racha.a}</span></div>
      <div class="sr"><span>Mejor racha</span><span class="sv">🏆 ${S.racha.m}</span></div>
      <div class="sr"><span>Items en isla</span><span class="sv">${S.isla.flat().filter(Boolean).length}</span></div>
    </div>
    <div class="as"><h3>🌍 Por Mundo</h3>${bw.map(w=>`<div class="sr"><span>${w.i} ${w.n}</span><span class="sv">${w.c}</span></div>`).join('')}</div>
    <div class="as"><h3>💾 Respaldo</h3><p style="font-size:13px;color:#999;margin-bottom:12px">Copia el progreso.</p>
      <button class="btn btn-gold" onclick="expB()" style="width:100%;margin-bottom:8px;font-size:9px">📋 Copiar</button>
      <button class="btn btn-secondary" onclick="impB()" style="width:100%;font-size:9px">📥 Restaurar</button></div>
    <div class="as"><h3>⚠️ Peligro</h3><button class="btn" style="width:100%;font-size:9px;background:#e74c3c;color:#fff;border-color:#c0392b" onclick="resetG()">🗑️ Reiniciar</button></div>`;
}
function expB(){navigator.clipboard.writeText(JSON.stringify(S)).then(()=>alert('✅ Copiado')).catch(()=>prompt('Copia:',JSON.stringify(S)));}
function impB(){const d=prompt('Pega el respaldo:');if(d){try{S=JSON.parse(d);save();location.reload();}catch(e){alert('❌ No válido');}}}
function resetG(){if(confirm('⚠️ ¿Borrar TODO?'))if(confirm('🔴 ÚLTIMA OPORTUNIDAD')){localStorage.removeItem('bq');location.reload();}}

function todayS(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function yesterdayS(){const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

window.addEventListener('DOMContentLoaded',init);
</script>
