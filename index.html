<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BlockQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--grass:#5D8C2E;--gd:#4A7024;--dirt:#8B6914;--dd:#6B4F0E;--sky:#7EC8E3;--sd:#5BA3C9;--gold:#F1C40F;--water:#3498DB;--td:#2C3E50;--tl:#ECF0F1;--bg:#1a1a2e;--red:#E74C3C;--green:#2ecc71;--purp:#9B59B6;--pb:3px solid #2C3E50}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--td);min-height:100vh;overflow-x:hidden;user-select:none}
.scr{display:none;min-height:100vh;position:relative}.scr.on{display:flex;flex-direction:column}
.pf{font-family:'Press Start 2P',monospace}

/* Splash */
#splash{background:linear-gradient(180deg,var(--sky) 0%,var(--sd) 40%,var(--grass) 40%,var(--gd) 60%,var(--dirt) 60%,var(--dd) 100%);align-items:center;justify-content:center;padding:20px;text-align:center}
#splash h1{font-family:'Press Start 2P',monospace;font-size:clamp(28px,8vw,48px);color:#fff;text-shadow:4px 4px 0 var(--gd);margin-bottom:8px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.sub{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,12px);color:var(--gold);margin-bottom:30px;text-shadow:2px 2px 0 rgba(0,0,0,0.4)}
.sbox{background:rgba(255,255,255,0.95);border-radius:12px;padding:24px;width:100%;max-width:380px;border:var(--pb)}
.sbox label{display:block;font-weight:700;font-size:14px;margin-bottom:8px}
.sbox input[type="text"]{width:100%;padding:12px;border:var(--pb);border-radius:8px;font-size:16px;margin-bottom:16px;outline:none;font-family:Nunito,sans-serif}
.avg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.avo{aspect-ratio:1;border:3px solid #ccc;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:36px;background:#f9f9f9;transition:all .2s}
.avo span{font-size:10px;margin-top:4px;font-weight:700}.avo.sel{border-color:var(--grass);background:#e8f5e9;transform:scale(1.08)}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,13px);padding:14px 24px;border:none;border-radius:8px;cursor:pointer;border:var(--pb);transition:all .15s}
.btn:active{transform:scale(0.95)}
.b1{background:var(--grass);color:#fff}.b2{background:var(--gold);color:var(--td)}.b3{background:#ecf0f1;color:var(--td)}.b4{background:var(--purp);color:#fff}

/* Tutorial */
.tov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}.tov.hid{display:none}
.tc{background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;text-align:center;border:var(--pb)}
.tc .te{font-size:56px;margin-bottom:12px}.tc h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:12px;line-height:1.6}.tc p{font-size:15px;color:#555;margin-bottom:20px;line-height:1.6}
.tdots{display:flex;gap:8px;justify-content:center;margin-bottom:16px}.tdot{width:10px;height:10px;border-radius:50%;background:#ddd}.tdot.on{background:var(--grass)}

/* Island */
#island{background:linear-gradient(180deg,var(--sky) 0%,var(--sd) 35%,transparent 35%);background-color:var(--grass);padding-bottom:20px}
.ih{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.pi{display:flex;align-items:center;gap:10px}.pa{font-size:32px}
.pn{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,13px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,0.3)}
.sb{font-family:'Press Start 2P',monospace;font-size:11px;background:rgba(0,0,0,0.3);color:var(--gold);padding:6px 12px;border-radius:20px}
.il{text-align:center;font-size:12px;color:rgba(255,255,255,0.6);padding:4px 0}
.igw{padding:4px 12px;display:flex;justify-content:center}
.ig{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;width:100%;max-width:340px;background:var(--dd);border:4px solid var(--dd);border-radius:8px;padding:2px}
.ic{background:var(--grass);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4.5vw,24px);aspect-ratio:1}
.ic.hi{background:#4a8c1e}.ic.pl{background:var(--gd);cursor:pointer;animation:pu 1s ease-in-out infinite}
@keyframes pu{0%,100%{box-shadow:inset 0 0 0 rgba(241,196,15,0)}50%{box-shadow:inset 0 0 8px rgba(241,196,15,0.5)}}
.ca{padding:16px;display:flex;justify-content:center}
.dc{background:rgba(255,255,255,0.95);border:4px solid var(--gold);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;max-width:380px;width:100%;box-shadow:0 0 20px rgba(241,196,15,0.3)}
.dc:active{transform:scale(0.97)}.dc.av{animation:gl 1.5s ease-in-out infinite}.dc.dn{opacity:0.6;cursor:default;animation:none;border-color:#ccc;box-shadow:none}
@keyframes gl{0%,100%{box-shadow:0 0 15px rgba(241,196,15,0.3)}50%{box-shadow:0 0 35px rgba(241,196,15,0.6)}}
.ci0{font-size:44px}.ct h3{font-family:'Press Start 2P',monospace;font-size:11px;margin-bottom:6px}.ct p{font-size:14px;color:#666}
.car{margin-left:auto;font-size:24px;animation:ab 1s ease-in-out infinite}
@keyframes ab{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
.inav{padding:12px 16px;display:flex;gap:8px;justify-content:center}.inav .btn{font-size:9px;padding:10px 16px;flex:1;max-width:180px}
.pbr{background:var(--gold);color:var(--td);text-align:center;padding:10px;font-family:'Press Start 2P',monospace;font-size:9px;line-height:1.5;display:none}.pbr.on{display:block}

/* Game Screen */
#game{background:var(--bg);color:var(--tl);padding:12px;align-items:center}
.game-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:440px;margin-bottom:8px}
.game-title{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,13px);color:var(--gold);line-height:1.5}
.game-lives{font-size:20px;letter-spacing:2px}
.game-prompt{font-size:14px;color:#ccc;background:rgba(255,255,255,0.08);border-radius:10px;padding:14px;margin-bottom:12px;max-width:440px;width:100%;line-height:1.6;border-left:4px solid var(--gold);text-align:center}
.game-area{max-width:440px;width:100%}
.game-fb{text-align:center;padding:16px;font-family:'Press Start 2P',monospace;font-size:11px;line-height:1.8}
.game-counter{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);text-align:center;margin-bottom:10px}

/* Constructor Game */
.build-grid{display:grid;gap:2px;margin:0 auto 12px;width:fit-content}
.build-cell{width:clamp(36px,9vw,48px);height:clamp(36px,9vw,48px);background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:4px;cursor:pointer;transition:all .15s}
.build-cell.filled{background:var(--grass);border-color:var(--gd);box-shadow:inset 0 -3px 0 var(--gd)}
.build-cell:hover{border-color:rgba(255,255,255,0.3)}

/* Ordena Game */
.ord-sequence{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:56px;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;border:2px dashed rgba(255,255,255,0.15);margin-bottom:14px}
.ord-slot{width:clamp(40px,10vw,56px);height:clamp(40px,10vw,56px);background:rgba(255,255,255,0.08);border:2px dashed rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;font-family:'Press Start 2P',monospace}
.ord-slot.filled{background:var(--grass);border:2px solid var(--gd);font-size:20px;cursor:pointer}
.ord-pool{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.ord-card{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .2s;text-align:center;min-width:80px}
.ord-card:hover{background:rgba(255,255,255,0.18)}.ord-card:active{transform:scale(0.95)}
.ord-card .oc-emoji{font-size:24px;margin-bottom:4px}
.ord-card .oc-text{font-size:11px;color:#ccc;font-weight:600}
.ord-card.used{opacity:0.3;pointer-events:none}

/* Memory Game */
.mem-grid{display:grid;gap:6px;justify-content:center;margin-bottom:12px}
.mem-card{aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;text-align:center;padding:4px;transition:all .3s;width:clamp(60px,16vw,80px);line-height:1.3}
.mem-card.face-down{background:var(--purp);border:2px solid #7d3c98;color:transparent}
.mem-card.face-down::after{content:'❓';font-size:24px}
.mem-card.face-up{background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);color:#fff}
.mem-card.matched{background:rgba(46,204,113,0.2);border:2px solid var(--green);color:var(--green)}
.mem-card.wrong{animation:shake .4s;border-color:var(--red)!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Victory */
#victory{background:radial-gradient(ellipse at center,#2c1654 0%,var(--bg) 70%);align-items:center;justify-content:center;text-align:center;padding:20px}
.vch{font-size:80px;animation:vb .8s ease-out}
@keyframes vb{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.vt{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5vw,22px);color:var(--gold);margin:16px 0 8px;text-shadow:2px 2px 0 rgba(0,0,0,0.5)}
.vi{font-size:56px;margin:16px 0;animation:fl 2s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.vn{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--tl);margin-bottom:20px}
.vbs{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}.vbs .btn{width:100%}

/* Other screens - compact */
#inventory,#portal,#admin{padding:16px}
#inventory{background:linear-gradient(180deg,var(--dirt) 0%,var(--dd) 100%)}
.invh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.invh h2{font-family:'Press Start 2P',monospace;font-size:14px;color:#fff}
.inv-empty{text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:40px 20px;line-height:1.6}
.invg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.invs{aspect-ratio:1;background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.invn{font-size:7px;font-family:'Press Start 2P',monospace;color:rgba(255,255,255,0.7);margin-top:4px;text-align:center}
#portal{background:var(--bg)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ph h2{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold)}
.wg{display:flex;flex-direction:column;gap:12px}
.wc{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.wc:active{transform:scale(0.98)}.wi{font-size:36px}
.winfo h3{font-family:'Press Start 2P',monospace;font-size:10px;color:#fff;margin-bottom:4px}.winfo p{font-size:12px;color:#999}
.wp{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold)}
#admin{background:#1a1a2e;color:#fff}
.ah{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ah h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--purp)}
.as{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-bottom:16px}
.as h3{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:12px}
.sr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:14px}
.sv{font-weight:700;color:var(--gold)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:20px}.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:340px;width:100%;border:var(--pb)}
.mbox h3{font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:8px}.mbox p{font-size:14px;color:#666;margin-bottom:16px}
.ci2{display:flex;gap:8px;justify-content:center;margin:16px 0}
.ci2 input{width:48px;height:48px;text-align:center;font-size:20px;font-weight:700;border:var(--pb);border-radius:8px;outline:none;font-family:Nunito,sans-serif}
.mbtn{display:flex;gap:8px;justify-content:center}.mbtn .btn{font-size:9px;padding:10px 14px}
.bflee{background:transparent;border:2px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-size:11px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:Nunito,sans-serif}
</style>
</head>
<body>
<div class="tov hid" id="tut"><div class="tc"><div class="te" id="tutE"></div><h3 id="tutT"></h3><p id="tutP"></p><div class="tdots" id="tutD"></div><button class="btn b1" onclick="nxTut()" id="tutB" style="width:100%"></button></div></div>

<div id="splash" class="scr on">
  <h1>BlockQuest</h1><p class="sub">Tu isla, tus misiones</p>
  <div class="sbox">
    <label>¿Cómo te llamas?</label><input type="text" id="pName" placeholder="Tu nombre" maxlength="16" autocomplete="off">
    <label>Elige tu avatar</label><div class="avg" id="avG"></div>
    <button class="btn b1" onclick="startGame()" style="width:100%">⚔️ ¡COMENZAR!</button>
  </div>
</div>

<div id="island" class="scr">
  <div class="pbr" id="pBnr">📍 Toca una celda para colocar — <span style="font-family:Nunito;cursor:pointer;text-decoration:underline" onclick="cancelPl()">Cancelar</span></div>
  <div class="ih"><div class="pi"><span class="pa" id="iAv"></span><span class="pn" id="iNm"></span></div><div class="sb" id="sBdg">🔥 0</div></div>
  <div class="il" id="iLbl"></div>
  <div class="igw"><div class="ig" id="iGr"></div></div>
  <div class="ca"><div class="dc" id="dCh" onclick="openDaily()"><span class="ci0" id="cIc">🎁</span><div class="ct"><h3 id="cTi">👆 TOCA AQUÍ</h3><p id="cSu">Tu misión del día</p></div><span class="car" id="cAr">▶</span></div></div>
  <div class="inav"><button class="btn b2" onclick="showS('portal')">🌍 Más Misiones</button><button class="btn b3" onclick="showS('inventory')">🎒 Inventario</button></div>
  <div style="text-align:center;padding:8px"><span style="font-size:10px;color:rgba(255,255,255,0.3);cursor:pointer" id="adTr">BlockQuest v3</span></div>
</div>

<div id="game" class="scr">
  <div class="game-header"><button class="bflee" onclick="flee()">← Huir</button><div class="game-lives" id="gLives"></div></div>
  <div class="game-title" id="gTitle"></div>
  <div class="game-prompt" id="gPrompt"></div>
  <div class="game-counter" id="gCounter"></div>
  <div class="game-area" id="gArea"></div>
</div>

<div id="victory" class="scr">
  <div class="vch">🎁</div><h2 class="vt">¡Misión Cumplida!</h2>
  <div class="vi" id="vEm"></div><div class="vn" id="vNm"></div>
  <div class="vbs"><button class="btn b2" onclick="plVic()">🏝️ Poner en mi isla</button><button class="btn b3" onclick="showS('island')">🎒 Guardar</button></div>
</div>

<div id="inventory" class="scr">
  <div class="invh"><h2>🎒 Inventario</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div id="invC"></div>
</div>
<div id="portal" class="scr">
  <div class="ph"><h2>🌍 Portal</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div class="wg" id="wGr"></div>
</div>
<div id="admin" class="scr">
  <div class="ah"><h2>🔮 Panel Mamá</h2><button class="btn b3" onclick="showS('island')" style="font-size:9px;padding:8px 12px">← Isla</button></div><div id="adC"></div>
</div>
<div class="modal" id="codeM"><div class="mbox"><h3>🔒 Código</h3><p>4 dígitos</p><div class="ci2"><input type="number" maxlength="1" class="cd" data-i="0"><input type="number" maxlength="1" class="cd" data-i="1"><input type="number" maxlength="1" class="cd" data-i="2"><input type="number" maxlength="1" class="cd" data-i="3"></div><div class="mbtn"><button class="btn b4" onclick="chkCode()">Entrar</button><button class="btn b3" onclick="clCode()">Cancelar</button></div></div></div>

<script>
const CODE='2017';
const AVS=[{id:'creeper',e:'👾',n:'Creeper'},{id:'warrior',e:'⚔️',n:'Guerrera'},{id:'cat',e:'🐱',n:'Gatita'},{id:'star',e:'⭐',n:'Estrella'},{id:'flower',e:'🌸',n:'Flor'},{id:'dragon',e:'🐉',n:'Dragón'}];
const WS=[{id:'lab',n:'Lab. de Pociones',i:'⚗️',d:'Construye con bloques'},{id:'cas',n:'Castillo Antiguo',i:'🏰',d:'Ordena la historia'},{id:'vol',n:'Volcán de Fuego',i:'🌋',d:'Cadenas y ciencia'},{id:'bib',n:'Biblioteca Encantada',i:'📜',d:'Ordena palabras'},{id:'tie',n:'Tierra Desconocida',i:'🗺️',d:'Memory en inglés'}];

// Tutorial
const TUT=[{e:'🔨',t:'¡Mini-juegos reales!',p:'Construye formas, ordena secuencias y encuentra pares. ¡No es un quiz!'},{e:'❤️',t:'Tienes 3 vidas',p:'Cada error te quita una vida. Si llegas a 0, reinicia la misión.'},{e:'🏝️',t:'Gana items',p:'Completa misiones para ganar items y llenar tu isla.'},{e:'🎁',t:'Cofre diario',p:'Cada día hay una misión nueva. ¡Toca el cofre dorado!'}];
let tS=0;
function showTut(){tS=0;$('tut').classList.remove('hid');rTut();}
function rTut(){const s=TUT[tS];$('tutE').textContent=s.e;$('tutT').textContent=s.t;$('tutP').textContent=s.p;$('tutB').textContent=tS<TUT.length-1?'Siguiente →':'¡A jugar! 🎮';$('tutD').innerHTML=TUT.map((_,i)=>'<div class="tdot '+(i===tS?'on':'')+'"></div>').join('');}
function nxTut(){tS++;if(tS>=TUT.length){$('tut').classList.add('hid');S.tut=1;save();}else rTut();}

function $(id){return document.getElementById(id);}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ===== MISSIONS =====
function genMissions(){return[
  // 🔨 CONSTRUCTOR — Matemáticas
  {id:'lab01',w:'lab',type:'build',titulo:'Rectángulo Secreto',
   prompt:function(){const a=ri(2,4),b=ri(3,6),area=a*b;return{rows:6,cols:8,goal:'area',target:area,hint:'Construye un RECTÁNGULO con área '+area+' bloques.\nDebe ser un rectángulo perfecto (sin hoyos).'};},
   item:{id:'e1',n:'Estrella Guía',e:'⭐'}},
  {id:'lab02',w:'lab',type:'build',titulo:'Perímetro Mágico',
   prompt:function(){const p=[12,14,16,18][ri(0,3)];return{rows:6,cols:8,goal:'perimeter',target:p,hint:'Construye una forma cuyo PERÍMETRO sea exactamente '+p+'.\nEl perímetro es el borde exterior de tu forma.'};},
   item:{id:'d1',n:'Huevo de Dragón',e:'🐉'}},
  {id:'lab03',w:'lab',type:'build',titulo:'Espejo de Bloques',
   prompt:function(){
     const rows=5,cols=8,half=4,pattern=Array(rows).fill(null).map(()=>Array(half).fill(0));
     const blocks=ri(4,7);let placed=0;
     while(placed<blocks){const r=ri(0,rows-1),c=ri(0,half-1);if(!pattern[r][c]){pattern[r][c]=1;placed++;}}
     return{rows,cols,goal:'mirror',target:pattern,hint:'Copia el patrón de la IZQUIERDA en el lado DERECHO.\n¡Como un espejo!'};},
   item:{id:'c1',n:'Cristal Azul',e:'💎'}},

  // 📋 ORDENA — Historia

function load(){try{const s=localStorage.getItem('bq3');S=s?JSON.parse(s):defS();}catch(e){S=defS();}}
function save(){localStorage.setItem('bq3',JSON.stringify(S));}

function init(){
  load();MS=genMissions();
  if(S.perfil){showS('island');if(!S.tut)showTut();}
  else{renderAv();showS('splash');}

function updateChest(){
  var today=todayS();
  if(!S.diaria.f||S.diaria.f!==today){
    var avail=MS.filter(function(m){return!S.done.find(function(d){return d.id===m.id;});});

    S.diaria={f:today,id:avail[ri(0,avail.length-1)].id,c:false};save();
  }

function openDaily(){if(S.diaria.c)return;var m=MS.find(function(x){return x.id===S.diaria.id;});if(m)launchGame(m);}

// ===== GAME LAUNCHER =====
function launchGame(m){
  curM=m;var p=m.prompt();gState={lives:3,puzzle:p};showS('game');
  $('gTitle').textContent=m.titulo;$('gLives').textContent='❤️❤️❤️';$('gPrompt').textContent=p.hint;

  else if(m.type==='order')initOrder(p);
  else if(m.type==='memory')initMemory(p);
}
function flee(){curM=null;gState=null;showS('island');}
function loseLife(){
  gState.lives--;$('gLives').textContent='❤️'.repeat(gState.lives)+'🖤'.repeat(3-gState.lives);
  if(gState.lives<=0){setTimeout(function(){$('gArea').innerHTML='<div class="game-fb" style="color:var(--red)">💀 ¡Sin vidas!<br><br><button class="btn b1" style="margin:8px" onclick="launchGame(curM)">🔄 Reintentar</button><button class="btn b3" style="margin:8px" onclick="flee()">← Huir</button></div>';},600);}
}

// ===== 🔨 CONSTRUCTOR =====
function initBuild(p){
  var grid=[];for(var r=0;r<p.rows;r++){grid[r]=[];for(var c=0;c<p.cols;c++)grid[r][c]=0;}
  if(p.goal==='mirror'){
    // Show pattern on left half
    for(var r2=0;r2<p.target.length;r2++)for(var c2=0;c2<p.target[r2].length;c2++)if(p.target[r2][c2])grid[r2][c2]=2;// 2=pattern (non-editable)
  }
  gState.grid=grid;gState.buildP=p;renderBuild();
}
function renderBuild(){
  var p=gState.buildP,g=gState.grid,filled=0;
  var html='<div class="build-grid" style="grid-template-columns:repeat('+p.cols+',1fr)">';
  for(var r=0;r<p.rows;r++)for(var c=0;c<p.cols;c++){
    var v=g[r][c],cls='build-cell';
    if(v===2)cls+=' filled" style="background:var(--purp);cursor:default';
    else if(v===1){cls+=' filled';filled++;}
    var editable=(p.goal==='mirror')?c>=p.cols/2:true;
    if(v===2)editable=false;
    html+='<div class="'+cls+'" '+(editable?'onclick="toggleBuild('+r+','+c+')"':'')+' data-r="'+r+'" data-c="'+c+'"></div>';
  }
  html+='</div>';
  // Counter
  if(p.goal==='area')html+='<div class="game-counter">Bloques: '+filled+' / Objetivo: '+p.target+'</div>';
  else if(p.goal==='perimeter'){var per=calcPerimeter(g,p.rows,p.cols);html+='<div class="game-counter">Perímetro actual: '+per+' / Objetivo: '+p.target+'</div>';}
  else if(p.goal==='mirror')html+='<div class="game-counter">Copia el patrón morado en el lado derecho</div>';
  html+='<div style="text-align:center;margin-top:8px"><button class="btn b2" onclick="checkBuild()">✅ Verificar</button> <button class="btn b3" onclick="clearBuild()" style="margin-left:8px">🗑️ Borrar</button></div>';
  $('gArea').innerHTML=html;
}
function toggleBuild(r,c){if(gState.lives<=0)return;gState.grid[r][c]=gState.grid[r][c]===1?0:1;renderBuild();}
function clearBuild(){var p=gState.buildP;for(var r=0;r<p.rows;r++)for(var c=0;c<p.cols;c++)if(gState.grid[r][c]===1)gState.grid[r][c]=0;renderBuild();}
function checkBuild(){
  var p=gState.buildP,g=gState.grid,ok=false;
  if(p.goal==='area'){
    var filled=0;for(var r=0;r<p.rows;r++)for(var c=0;c<p.cols;c++)if(g[r][c]===1)filled++;
    if(filled!==p.target){loseLife();if(gState.lives>0)$('gCounter').textContent='❌ Tienes '+filled+' bloques, necesitas '+p.target;return;}
    // Check if it's a rectangle
    var minR=99,maxR=-1,minC=99,maxC=-1;
    for(var r2=0;r2<p.rows;r2++)for(var c2=0;c2<p.cols;c2++)if(g[r2][c2]===1){minR=Math.min(minR,r2);maxR=Math.max(maxR,r2);minC=Math.min(minC,c2);maxC=Math.max(maxC,c2);}
    var isRect=true,rectArea=(maxR-minR+1)*(maxC-minC+1);
    if(rectArea!==filled)isRect=false;
    else{for(var r3=minR;r3<=maxR;r3++)for(var c3=minC;c3<=maxC;c3++)if(g[r3][c3]!==1)isRect=false;}
    if(!isRect){loseLife();if(gState.lives>0)$('gCounter').textContent='❌ Tiene '+filled+' bloques pero NO es un rectángulo';return;}
    ok=true;
  }else if(p.goal==='perimeter'){
    var per=calcPerimeter(g,p.rows,p.cols);
    if(per!==p.target){loseLife();if(gState.lives>0)$('gCounter').textContent='❌ Perímetro: '+per+', necesitas '+p.target;return;}
    ok=true;
  }else if(p.goal==='mirror'){
    var half=p.cols/2;ok=true;
    for(var r4=0;r4<p.rows;r4++)for(var c4=0;c4<half;c4++){
      var patVal=p.target[r4][c4];var mirrorC=p.cols-1-c4;var mirVal=g[r4][mirrorC]===1?1:0;
      if(patVal!==mirVal)ok=false;
    }
    if(!ok){loseLife();if(gState.lives>0)$('gCounter').textContent='❌ El espejo no coincide. ¡Fíjate bien!';return;}
  }
  if(ok)winGame();
}
function calcPerimeter(g,rows,cols){
  var p=0;for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    if(g[r][c]===1){
      if(r===0||g[r-1][c]!==1)p++;if(r===rows-1||g[r+1][c]!==1)p++;
      if(c===0||g[r][c-1]!==1)p++;if(c===cols-1||g[r][c+1]!==1)p++;
    }
  }return p;
}

// ===== 📋 ORDENA =====
function initOrder(p){gState.sequence=[];gState.orderP=p;renderOrder();}
function renderOrder(){
  var p=gState.orderP,seq=gState.sequence;
  // Sequence area (slots)
  var html='<div class="ord-sequence">';
  for(var i=0;i<p.correct.length;i++){
    if(i<seq.length){var it=p.items.find(function(x){return x.id===seq[i];});html+='<div class="ord-slot filled" onclick="undoOrder('+i+')">'+it.emoji+'</div>';}
    else html+='<div class="ord-slot">'+(i+1)+'</div>';
  }
  html+='</div>';
  // Pool
  html+='<div class="ord-pool">';
  p.items.forEach(function(it){
    var used=seq.indexOf(it.id)>=0;
    html+='<div class="ord-card'+(used?' used':'')+'" onclick="pickOrder(\''+it.id+'\')">';
    html+='<div class="oc-emoji">'+it.emoji+'</div><div class="oc-text">'+it.text+'</div></div>';
  });
  html+='</div>';
  if(seq.length===p.correct.length)html+='<div style="text-align:center"><button class="btn b2" onclick="checkOrder()">✅ Verificar</button></div>';
  $('gArea').innerHTML=html;$('gCounter').textContent='Paso '+seq.length+' de '+p.correct.length;
}
function pickOrder(id){if(gState.lives<=0)return;if(gState.sequence.indexOf(id)>=0)return;gState.sequence.push(id);renderOrder();}
function undoOrder(i){gState.sequence=gState.sequence.slice(0,i);renderOrder();}
function checkOrder(){
  var p=gState.orderP,seq=gState.sequence,ok=true;
  for(var i=0;i<p.correct.length;i++)if(seq[i]!==p.correct[i]){ok=false;break;}
  if(ok)winGame();
  else{loseLife();if(gState.lives>0){gState.sequence=[];$('gCounter').textContent='❌ Orden incorrecto. ¡Piensa de nuevo!';setTimeout(renderOrder,1200);}}
}

// ===== 🃏 MEMORY =====
function initMemory(p){
  var cards=[];
  p.pairs.forEach(function(pair,i){
    cards.push({id:i,side:'a',text:pair.a,pairId:i,flipped:false,matched:false});
    cards.push({id:i,side:'b',text:pair.b,pairId:i,flipped:false,matched:false});
  });
  gState.cards=shuf(cards);gState.flipped=[];gState.moves=18;gState.matched=0;gState.totalPairs=p.pairs.length;gState.locked=false;
  renderMemory();
}
function renderMemory(){
  var cards=gState.cards,cols=Math.ceil(Math.sqrt(cards.length*1.5));if(cols>5)cols=5;
  var html='<div class="mem-grid" style="grid-template-columns:repeat('+cols+',1fr)">';
  cards.forEach(function(c,i){
    var cls='mem-card';
    if(c.matched)cls+=' matched';else if(c.flipped)cls+=' face-up';else cls+=' face-down';
    html+='<div class="'+cls+'" data-i="'+i+'" onclick="flipCard('+i+')">'+(c.flipped||c.matched?c.text:'')+'</div>';
  });
  html+='</div>';
  $('gArea').innerHTML=html;$('gCounter').textContent='Movimientos: '+gState.moves+' | Pares: '+gState.matched+'/'+gState.totalPairs;
}
function flipCard(i){
  if(gState.locked||gState.lives<=0)return;
  var c=gState.cards[i];if(c.flipped||c.matched)return;
  c.flipped=true;gState.flipped.push(i);renderMemory();
  if(gState.flipped.length===2){
    gState.locked=true;gState.moves--;
    var c1=gState.cards[gState.flipped[0]],c2=gState.cards[gState.flipped[1]];
    if(c1.pairId===c2.pairId&&c1.side!==c2.side){
      c1.matched=true;c2.matched=true;gState.matched++;gState.flipped=[];gState.locked=false;
      renderMemory();
      if(gState.matched===gState.totalPairs)setTimeout(winGame,600);
    }else{
      setTimeout(function(){
        c1.flipped=false;c2.flipped=false;gState.flipped=[];gState.locked=false;
        renderMemory();
        if(gState.moves<=0){loseLife();if(gState.lives>0){gState.moves=18;gState.cards.forEach(function(x){if(!x.matched)x.flipped=false;});gState.cards=shuf(gState.cards);$('gCounter').textContent='❌ Sin movimientos. Las cartas se mezclaron.';setTimeout(renderMemory,1200);}}
      },900);
    }
  }
}

// ===== WIN =====
function winGame(){
  var m=curM;
  S.done.push({id:m.id,f:todayS(),w:m.w});
  if(S.diaria.id===m.id){S.diaria.c=true;var t=todayS(),y=yesterdayS();if(S.racha.u===y)S.racha.a++;else if(S.racha.u!==t)S.racha.a=1;S.racha.u=t;if(S.racha.a>S.racha.m)S.racha.m=S.racha.a;}
  S.inv.push({id:m.item.id,n:m.item.n,e:m.item.e});save();
  $('vEm').textContent=m.item.e;$('vNm').textContent=m.item.n;showS('victory');MS=genMissions();
}

    return'<div class="wc" onclick="openW(\''+w.id+'\')"><span class="wi">'+w.i+'</span><div class="winfo"><h3>'+w.n+'</h3><p>'+w.d+'</p></div><span class="wp">'+dn+'/'+tot+'</span></div>';
  }).join('');
}
function openW(wid){
  var ms=MS.filter(function(m){return m.w===wid;}),w=WS.find(function(x){return x.id===wid;});
  var html='<button class="btn b3" onclick="renderPortal()" style="font-size:9px;padding:8px 12px;align-self:flex-start">← Mundos</button>';
  html+='<h3 style="font-family:Press Start 2P;font-size:12px;color:#fff;margin:8px 0">'+w.i+' '+w.n+'</h3>';
  ms.forEach(function(m){
    var dn=S.done.find(function(d){return d.id===m.id;});
    var typeLabel=m.type==='build'?'🔨 Construir':m.type==='order'?'📋 Ordenar':'🃏 Memory';
    if(dn)html+='<div class="wc" style="opacity:0.5"><span class="wi">'+m.item.e+'</span><div class="winfo"><h3 style="font-size:10px">'+m.titulo+'</h3><p>'+typeLabel+'</p></div><span class="wp">✅</span></div>';
    else html+='<div class="wc" onclick="startMP(\''+m.id+'\')"><span class="wi">'+m.item.e+'</span><div class="winfo"><h3 style="font-size:10px">'+m.titulo+'</h3><p>'+typeLabel+'</p></div><span class="wp">▶️</span></div>';
  });
  $('wGr').innerHTML=html;
}
function startMP(id){var m=MS.find(function(x){return x.id===id;});if(m)launchGame(m);}

// ===== ADMIN =====
function setupAdmin(){var t=0,ti;$('adTr').addEventListener('click',function(){t++;clearTimeout(ti);if(t>=4){t=0;$('codeM').classList.add('on');document.querySelector('.cd').focus();}ti=setTimeout(function(){t=0;},2000);});}
function setupCodeIn(){document.querySelectorAll('.cd').forEach(function(inp,i){inp.addEventListener('input',function(e){if(e.target.value.length>1)e.target.value=e.target.value.slice(-1);if(e.target.value&&i<3)document.querySelectorAll('.cd')[i+1].focus();});inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!e.target.value&&i>0)document.querySelectorAll('.cd')[i-1].focus();});});}
function chkCode(){var c=Array.from(document.querySelectorAll('.cd')).map(function(d){return d.value;}).join('');if(c===CODE){clCode();showS('admin');}else{document.querySelectorAll('.cd').forEach(function(d){d.value='';d.style.borderColor='var(--red)';});setTimeout(function(){document.querySelectorAll('.cd').forEach(function(d){d.style.borderColor='';});},1000);document.querySelector('.cd').focus();}}
function clCode(){$('codeM').classList.remove('on');document.querySelectorAll('.cd').forEach(function(d){d.value='';});}
function renderAdmin(){
  var bw=WS.map(function(w){return{i:w.i,n:w.n,c:S.done.filter(function(x){return x.w===w.id;}).length};});
  $('adC').innerHTML='<div class="as"><h3>📊 Stats</h3><div class="sr"><span>Misiones</span><span class="sv">'+S.done.length+' / '+MS.length+'</span></div><div class="sr"><span>Racha</span><span class="sv">🔥 '+S.racha.a+'</span></div><div class="sr"><span>Mejor</span><span class="sv">🏆 '+S.racha.m+'</span></div><div class="sr"><span>Items isla</span><span class="sv">'+S.isla.flat().filter(Boolean).length+'</span></div></div><div class="as"><h3>🌍 Mundos</h3>'+bw.map(function(w){return'<div class="sr"><span>'+w.i+' '+w.n+'</span><span class="sv">'+w.c+'</span></div>';}).join('')+'</div><div class="as"><h3>💾 Respaldo</h3><button class="btn b2" onclick="navigator.clipboard.writeText(JSON.stringify(S)).then(function(){alert(\'✅ Copiado\');}).catch(function(){prompt(\'Copia:\',JSON.stringify(S));})" style="width:100%;margin-bottom:8px;font-size:9px">📋 Copiar</button><button class="btn b3" onclick="var d=prompt(\'Pega:\');if(d){try{S=JSON.parse(d);save();location.reload();}catch(e){alert(\'❌\');}}" style="width:100%;font-size:9px">📥 Restaurar</button></div><div class="as"><h3>⚠️</h3><button class="btn" style="width:100%;font-size:9px;background:var(--red);color:#fff;border-color:#c0392b" onclick="if(confirm(\'¿Borrar TODO?\')){localStorage.removeItem(\'bq3\');location.reload();}">🗑️ Reset</button></div>';
}
function todayS(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function yesterdayS(){var d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
window.addEventListener('DOMContentLoaded',init);
</script>
